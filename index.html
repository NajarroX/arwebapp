<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AR Studio - Realidad Aumentada Personalizable</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    
    <!-- A-Frame y AR.js - Versiones compatibles -->
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    
    <!-- RecordRTC para grabación -->
    <script src="https://cdn.jsdelivr.net/npm/recordrtc@5.6.2/RecordRTC.min.js"></script>
    
    <!-- html2canvas para captura de fotos -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: #000;
            overflow: hidden;
            position: fixed;
            width: 100%;
            height: 100%;
        }
        
        /* Asegurar que la escena ocupe toda la pantalla */
        .a-canvas {
            position: fixed !important;
            top: 0 !important;
            left: 0 !important;
            width: 100% !important;
            height: 100% !important;
        }
        
        /* Pantalla de inicio */
        .start-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
            z-index: 2000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 0.5s ease;
        }
        
        .logo {
            text-align: center;
            margin-bottom: 40px;
        }
        
        .logo h1 {
            font-size: 3rem;
            font-weight: 700;
            background: linear-gradient(135deg, #00ff88, #00ccff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .logo p {
            color: #888;
            margin-top: 10px;
        }
        
        .instructions {
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            padding: 25px;
            margin: 20px;
            max-width: 350px;
            backdrop-filter: blur(10px);
        }
        
        .instructions h3 {
            color: #00ff88;
            margin-bottom: 15px;
        }
        
        .instructions ul {
            list-style: none;
        }
        
        .instructions li {
            color: #ccc;
            margin: 10px 0;
            padding-left: 20px;
            position: relative;
        }
        
        .instructions li::before {
            content: "▸";
            color: #00ff88;
            position: absolute;
            left: 0;
        }
        
        .start-btn {
            background: linear-gradient(135deg, #00ff88, #00ccff);
            border: none;
            padding: 16px 48px;
            border-radius: 40px;
            font-size: 1.2rem;
            font-weight: 600;
            color: #000;
            cursor: pointer;
            margin-top: 20px;
            transition: transform 0.2s;
        }
        
        .start-btn:active {
            transform: scale(0.98);
        }
        
        /* UI Principal */
        .ui-container {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255,255,255,0.1);
            padding: 12px 16px;
            z-index: 1000;
            display: none;
            flex-direction: column;
            gap: 12px;
        }
        
        /* Pestañas */
        .tabs {
            display: flex;
            gap: 8px;
            background: rgba(255,255,255,0.05);
            padding: 4px;
            border-radius: 50px;
        }
        
        .tab-btn {
            flex: 1;
            padding: 10px;
            border: none;
            background: transparent;
            color: #aaa;
            font-weight: 600;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.85rem;
        }
        
        .tab-btn.active {
            background: #00ff88;
            color: #000;
        }
        
        /* Paneles */
        .panel {
            display: none;
            gap: 10px;
            flex-wrap: wrap;
            max-height: 180px;
            overflow-y: auto;
            padding: 4px;
        }
        
        .panel.active {
            display: flex;
        }
        
        /* Items */
        .model-item, .marker-item {
            background: rgba(255,255,255,0.08);
            border-radius: 12px;
            padding: 8px 12px;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid transparent;
            min-width: calc(50% - 10px);
            flex: 1;
        }
        
        .model-item.active, .marker-item.active {
            border-color: #00ff88;
            background: rgba(0,255,136,0.1);
        }
        
        .model-preview, .marker-preview {
            width: 36px;
            height: 36px;
            background: #333;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
        }
        
        .model-info, .marker-info {
            flex: 1;
        }
        
        .model-name, .marker-name {
            color: white;
            font-weight: 500;
            font-size: 0.8rem;
        }
        
        .model-type, .marker-type {
            color: #888;
            font-size: 0.65rem;
        }
        
        /* Controles */
        .controls-row {
            display: flex;
            gap: 12px;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
        }
        
        .scale-control {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(255,255,255,0.05);
            padding: 6px 12px;
            border-radius: 40px;
        }
        
        .scale-control label {
            color: #aaa;
            font-size: 0.75rem;
        }
        
        .scale-control input {
            width: 100px;
        }
        
        .action-buttons {
            display: flex;
            gap: 10px;
        }
        
        .action-btn {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
        }
        
        .record-btn {
            background: #ff0000;
            color: white;
        }
        
        .record-btn.recording {
            animation: pulse 1s infinite;
        }
        
        .photo-btn {
            background: #333;
            color: white;
        }
        
        .reset-btn {
            background: #ff4444;
            color: white;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.8; }
        }
        
        /* Barra de estado */
        .status-bar {
            position: fixed;
            top: 10px;
            left: 10px;
            right: 10px;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(10px);
            padding: 10px 15px;
            border-radius: 30px;
            z-index: 1000;
            display: none;
            font-size: 0.7rem;
            color: #00ff88;
            text-align: center;
        }
        
        /* Scrollbar */
        .panel::-webkit-scrollbar {
            width: 3px;
        }
        
        .panel::-webkit-scrollbar-track {
            background: #1a1a1a;
            border-radius: 3px;
        }
        
        .panel::-webkit-scrollbar-thumb {
            background: #00ff88;
            border-radius: 3px;
        }
        
        @media (min-width: 768px) {
            .ui-container {
                left: auto;
                right: 20px;
                bottom: 20px;
                width: 380px;
                border-radius: 24px;
                border: 1px solid rgba(255,255,255,0.1);
            }
        }
        
        /* Ocultar mensajes de A-Frame */
        .a-loader-title, .a-dialog, .a-enter-vr {
            display: none !important;
        }
    </style>
</head>
<body>
    <!-- Pantalla de inicio -->
    <div class="start-screen" id="startScreen">
        <div class="logo">
            <h1>AR STUDIO</h1>
            <p>Realidad Aumentada Personalizable</p>
        </div>
        <div class="instructions">
            <h3>📱 CÓMO USAR</h3>
            <ul>
                <li>📸 Permite acceso a la cámara</li>
                <li>🖼️ IMAGE TRACKING: Enfoca el marcador</li>
                <li>🌍 WORLD TRACKING: Toca donde colocar</li>
                <li>🎨 Selecciona modelos y marcadores</li>
                <li>🎥 Graba video o toma fotos</li>
            </ul>
        </div>
        <button class="start-btn" id="startBtn">INICIAR EXPERIENCIA</button>
    </div>
    
    <!-- Barra de estado -->
    <div class="status-bar" id="statusBar">
        <span id="statusText">● SISTEMA LISTO</span>
    </div>
    
    <!-- UI Principal -->
    <div class="ui-container" id="uiContainer">
        <div class="tabs">
            <button class="tab-btn active" data-tab="models">📦 MODELOS</button>
            <button class="tab-btn" data-tab="markers">🏷️ MARCADORES</button>
            <button class="tab-btn" data-tab="tracking">🎯 TRACKING</button>
        </div>
        
        <div class="panel active" id="modelsPanel">
            <!-- Modelos dinámicos -->
        </div>
        
        <div class="panel" id="markersPanel">
            <!-- Marcadores dinámicos -->
        </div>
        
        <div class="panel" id="trackingPanel">
            <div class="controls-row">
                <div class="scale-control">
                    <label>🔍 ESCALA</label>
                    <input type="range" id="scaleSlider" min="0.1" max="2" step="0.05" value="0.8">
                    <span id="scaleValue" style="color:#00ff88; width:35px;">0.8</span>
                </div>
                <div class="action-buttons">
                    <button class="action-btn photo-btn" id="photoBtn">📷</button>
                    <button class="action-btn record-btn" id="recordBtn">🔴</button>
                    <button class="action-btn reset-btn" id="resetBtn">⟳</button>
                </div>
            </div>
            <div id="stopBtnContainer" style="display:none;">
                <button class="action-btn" id="stopRecordingBtn" style="width:100%; border-radius:40px; background:#333; padding:12px;">⏹️ DETENER GRABACIÓN</button>
            </div>
        </div>
    </div>
    
    <!-- Escena AR -->
    <a-scene 
        id="arScene"
        embedded 
        arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono_and_matrix; matrixCodeType: 3x3;"
        vr-mode-ui="enabled: false"
        device-orientation-permission-ui="enabled: false"
        renderer="alpha: false; antialias: true;"
        style="position: fixed; top: 0; left: 0; width: 100%; height: 100%;"
    >
        <!-- Cámara AR (AR.js la maneja automáticamente) -->
        
        <!-- Marcador para Image Tracking -->
        <a-marker id="imageMarker" preset="hiro" visible="false">
            <a-entity id="imageModel"></a-entity>
        </a-marker>
        
        <!-- Entidad para World Tracking -->
        <a-entity id="worldModel" visible="false">
            <a-box color="#00ff88" depth="0.4" height="0.4" width="0.4"></a-box>
        </a-entity>
        
        <!-- Luces -->
        <a-light type="ambient" intensity="0.6"></a-light>
        <a-light type="directional" intensity="0.8" position="5 10 7"></a-light>
    </a-scene>
    
    <script>
        // ============================================
        // CONFIGURACIÓN
        // ============================================
        
        // Elementos DOM
        const startScreen = document.getElementById('startScreen');
        const startBtn = document.getElementById('startBtn');
        const uiContainer = document.getElementById('uiContainer');
        const statusBar = document.getElementById('statusBar');
        const statusText = document.getElementById('statusText');
        const modelsPanel = document.getElementById('modelsPanel');
        const markersPanel = document.getElementById('markersPanel');
        const scaleSlider = document.getElementById('scaleSlider');
        const scaleValue = document.getElementById('scaleValue');
        const recordBtn = document.getElementById('recordBtn');
        const photoBtn = document.getElementById('photoBtn');
        const resetBtn = document.getElementById('resetBtn');
        const stopRecordingBtn = document.getElementById('stopRecordingBtn');
        const stopBtnContainer = document.getElementById('stopBtnContainer');
        
        // Elementos AR
        const imageMarker = document.getElementById('imageMarker');
        const imageModel = document.getElementById('imageModel');
        const worldModel = document.getElementById('worldModel');
        
        // Estado
        let currentTracking = 'image';
        let currentModelType = 'primitive';
        let currentModelData = null;
        let currentMarker = 'hiro';
        let worldPlaced = false;
        let isRecording = false;
        let recordRTC = null;
        let stream = null;
        let sceneElement = null;
        
        // ============================================
        // LIBRERÍA DE MODELOS
        // ============================================
        
        const modelLibrary = [
            { name: 'Mi Modelo', type: 'gltf', url: 'models/MaizToken-11.gltf', icon: '🎨', params: { width: 0.5, height: 0.5, depth: 0.5 } },
            { name: 'Mi Modelo', type: 'gltf', url: 'models/MaizToken-15.gltf', icon: '⚪', params: { radius: 0.3 } },
            { name: 'Mi Modelo', type: 'gltf', url: 'models/MaizToken-16.gltf' , icon: '🌀', params: { radius: 0.3, radiusTubular: 0.05 } },
            { name: 'Mi Modelo', type:'gltf', url: 'models/MaizToken-18.gltf', icon: '📀', params: { radius: 0.25, height: 0.5 } }
        ];
        
        // Librería de marcadores
        const markerLibrary = [
            { name: 'HIRO', type: 'preset', value: 'hiro', icon: '🎯' },
            { name: 'KANJI', type: 'preset', value: 'kanji', icon: '📜' }
        ];
        
        // ============================================
        // FUNCIONES UI
        // ============================================
        
        function renderModels() {
            modelsPanel.innerHTML = '';
            modelLibrary.forEach(model => {
                const div = document.createElement('div');
                div.className = 'model-item';
                if (currentModelData?.name === model.name) div.classList.add('active');
                div.innerHTML = `
                    <div class="model-preview">${model.icon}</div>
                    <div class="model-info">
                        <div class="model-name">${model.name}</div>
                        <div class="model-type">${model.type.toUpperCase()}</div>
                    </div>
                `;
                div.onclick = () => loadModel(model);
                modelsPanel.appendChild(div);
            });
        }
        
        function renderMarkers() {
            markersPanel.innerHTML = '';
            markerLibrary.forEach(marker => {
                const div = document.createElement('div');
                div.className = 'marker-item';
                if (currentMarker === marker.value) div.classList.add('active');
                div.innerHTML = `
                    <div class="marker-preview">${marker.icon}</div>
                    <div class="marker-info">
                        <div class="marker-name">${marker.name}</div>
                        <div class="marker-type">${marker.type.toUpperCase()}</div>
                    </div>
                `;
                div.onclick = () => selectMarker(marker);
                markersPanel.appendChild(div);
            });
        }
        
        // ============================================
        // MODELOS 3D
        // ============================================
        
        function loadModel(model) {
            currentModelData = model;
            currentModelType = model.type;
            
            // Actualizar UI
            document.querySelectorAll('.model-item').forEach(item => item.classList.remove('active'));
            event.target.closest('.model-item')?.classList.add('active');
            
            // Limpiar modelos actuales
            imageModel.innerHTML = '';
            worldModel.innerHTML = '';
            
            // Crear nuevo modelo según tipo
            let entity;
            if (model.type === 'primitive') {
                entity = document.createElement(`a-${model.primitive}`);
                entity.setAttribute('color', model.color);
                entity.setAttribute('scale', `${scaleSlider.value} ${scaleSlider.value} ${scaleSlider.value}`);
                
                // Parámetros específicos
                if (model.params) {
                    Object.entries(model.params).forEach(([key, val]) => {
                        entity.setAttribute(key, val);
                    });
                }
            } else if (model.type === 'gltf' && model.url) {
                entity = document.createElement('a-entity');
                entity.setAttribute('gltf-model', model.url);
                entity.setAttribute('scale', `${scaleSlider.value} ${scaleSlider.value} ${scaleSlider.value}`);
            }
            
            if (entity) {
                // Clonar para ambos modos
                const imageEntity = entity.cloneNode(true);
                const worldEntity = entity.cloneNode(true);
                imageModel.appendChild(imageEntity);
                worldModel.appendChild(worldEntity);
            }
            
            statusText.innerHTML = `✅ Modelo cargado: ${model.name}`;
        }
        
        function selectMarker(marker) {
            currentMarker = marker.value;
            
            document.querySelectorAll('.marker-item').forEach(item => item.classList.remove('active'));
            event.target.closest('.marker-item')?.classList.add('active');
            
            if (marker.type === 'preset') {
                imageMarker.setAttribute('preset', marker.value);
            }
            
            statusText.innerHTML = `🏷️ Marcador seleccionado: ${marker.name}`;
        }
        
        // ============================================
        // TRACKING MODES
        // ============================================
        
        function setTrackingMode(mode) {
            currentTracking = mode;
            
            if (mode === 'image') {
                imageMarker.setAttribute('visible', 'true');
                worldModel.setAttribute('visible', 'false');
                worldPlaced = false;
                statusText.innerHTML = `🖼️ MODO IMAGE TRACKING | Enfoca el marcador ${currentMarker.toUpperCase()}`;
            } else {
                imageMarker.setAttribute('visible', 'false');
                worldModel.setAttribute('visible', 'true');
                statusText.innerHTML = `🌍 MODO WORLD TRACKING | Toca la pantalla para colocar el modelo`;
            }
        }
        
        function placeWorldModel() {
            if (!worldPlaced && currentTracking === 'world') {
                // Obtener la cámara
                const camera = document.querySelector('[camera]');
                if (camera) {
                    // Posicionar frente a la cámara
                    worldModel.setAttribute('position', '0 0 -1.5');
                    worldPlaced = true;
                    
                    // Animación
                    worldModel.setAttribute('animation', 'property: scale; from: 0 0 0; to: 0.8 0.8 0.8; dur: 300');
                    setTimeout(() => worldModel.removeAttribute('animation'), 350);
                    
                    statusText.innerHTML = '✅ Modelo colocado! Puedes moverte alrededor';
                }
            } else if (worldPlaced) {
                statusText.innerHTML = 'ℹ️ Modelo ya colocado. Usa RESET para reubicar';
            }
        }
        
        function resetWorldModel() {
            if (currentTracking === 'world') {
                worldPlaced = false;
                worldModel.setAttribute('position', '0 0 0');
                statusText.innerHTML = '🔄 Posición reseteada. Toca para colocar nuevamente';
            }
        }
        
        function updateScale(value) {
            const scale = parseFloat(value);
            scaleValue.textContent = scale.toFixed(2);
            
            if (currentTracking === 'image') {
                imageModel.setAttribute('scale', `${scale} ${scale} ${scale}`);
            } else {
                worldModel.setAttribute('scale', `${scale} ${scale} ${scale}`);
            }
        }
        
        // ============================================
        // GRABACIÓN Y FOTOS
        // ============================================
        
        async function startRecording() {
            try {
                sceneElement = document.querySelector('a-scene');
                const canvas = sceneElement?.canvas;
                if (!canvas) throw new Error('Canvas no disponible');
                
                stream = canvas.captureStream(30);
                recordRTC = new RecordRTC(stream, {
                    type: 'video',
                    mimeType: 'video/webm',
                    bitsPerSecond: 3000000
                });
                
                recordRTC.startRecording();
                isRecording = true;
                
                recordBtn.classList.add('recording');
                recordBtn.style.display = 'none';
                stopBtnContainer.style.display = 'block';
                statusText.innerHTML = '🔴 GRABANDO VIDEO...';
                
            } catch (error) {
                console.error(error);
                statusText.innerHTML = '❌ Error al grabar';
            }
        }
        
        function stopRecording() {
            if (recordRTC && isRecording) {
                recordRTC.stopRecording(() => {
                    const blob = recordRTC.getBlob();
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `ar-video-${Date.now()}.webm`;
                    a.click();
                    URL.revokeObjectURL(url);
                    
                    if (stream) stream.getTracks().forEach(t => t.stop());
                    recordRTC = null;
                    isRecording = false;
                    
                    recordBtn.classList.remove('recording');
                    recordBtn.style.display = 'block';
                    stopBtnContainer.style.display = 'none';
                    statusText.innerHTML = '✅ Video guardado';
                });
            }
        }
        
        async function takePhoto() {
            try {
                const sceneElement = document.querySelector('a-scene');
                const canvas = sceneElement?.canvas;
                if (!canvas) throw new Error('Canvas no disponible');
                
                // Capturar el canvas
                const link = document.createElement('a');
                link.download = `ar-photo-${Date.now()}.png`;
                link.href = canvas.toDataURL('image/png');
                link.click();
                
                statusText.innerHTML = '📸 Foto guardada';
                
            } catch (error) {
                console.error(error);
                statusText.innerHTML = '❌ Error al tomar foto';
            }
        }
        
        // ============================================
        // INICIALIZACIÓN
        // ============================================
        
        function initApp() {
            // Cargar UI
            renderModels();
            renderMarkers();
            
            // Seleccionar modelo por defecto
            loadModel(modelLibrary[0]);
            selectMarker(markerLibrary[0]);
            
            // Configurar tracking
            setTrackingMode('image');
            
            // Mostrar UI
            startScreen.style.opacity = '0';
            setTimeout(() => {
                startScreen.style.display = 'none';
                uiContainer.style.display = 'flex';
                statusBar.style.display = 'block';
                statusText.innerHTML = '✅ AR ACTIVO | Cámara iniciada';
            }, 500);
            
            // Forzar inicio de cámara
            setTimeout(() => {
                const scene = document.querySelector('a-scene');
                if (scene) {
                    scene.addEventListener('arjs-video-loaded', () => {
                        statusText.innerHTML = '📷 Cámara activa | Listo para AR';
                    });
                }
            }, 1000);
        }
        
        // ============================================
        // EVENT LISTENERS
        // ============================================
        
        startBtn.addEventListener('click', initApp);
        
        // Pestañas
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
                document.getElementById(`${btn.dataset.tab}Panel`).classList.add('active');
            });
        });
        
        scaleSlider.addEventListener('input', (e) => updateScale(e.target.value));
        recordBtn.addEventListener('click', startRecording);
        stopRecordingBtn?.addEventListener('click', stopRecording);
        photoBtn.addEventListener('click', takePhoto);
        resetBtn.addEventListener('click', resetWorldModel);
        
        // Tocar pantalla para world tracking
        document.addEventListener('click', (e) => {
            if (e.target.closest('.ui-container')) return;
            if (currentTracking === 'world' && !worldPlaced) {
                placeWorldModel();
            }
        });
        
        console.log('%c🎨 AR STUDIO LISTO', 'color: #00ff88; font-size: 16px');
        console.log('📁 Para agregar modelos GLTF: colócalos en carpeta /models/');
        console.log('🏷️ Para agregar marcadores: genera .patt y colócalos en /markers/');
    </script>
</body>
</html>
