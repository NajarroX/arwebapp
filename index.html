<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AR Studio - Realidad Aumentada</title>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            overflow: hidden;
            background: #000;
        }
        
        /* Pantalla de inicio */
        .start-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0a0a0a;
            z-index: 2000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .start-card {
            background: #111;
            border: 2px solid #00ff88;
            padding: 30px 25px;
            max-width: 350px;
            width: 100%;
            text-align: center;
        }
        
        .start-card h1 {
            color: #00ff88;
            font-size: 2rem;
            margin-bottom: 20px;
        }
        
        .start-card p {
            color: #888;
            margin: 15px 0;
            line-height: 1.5;
        }
        
        .instructions {
            text-align: left;
            margin: 20px 0;
            padding-left: 20px;
        }
        
        .instructions li {
            color: #ccc;
            margin: 10px 0;
        }
        
        .start-btn {
            background: #00ff88;
            border: none;
            padding: 15px 30px;
            font-size: 1.1rem;
            font-weight: bold;
            color: #000;
            cursor: pointer;
            width: 100%;
            margin-top: 20px;
            border-radius: 0;
        }
        
        /* Panel de control */
        .control-panel {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0,0,0,0.9);
            padding: 15px;
            z-index: 100;
            display: none;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            border-top: 1px solid #333;
        }
        
        .btn {
            padding: 10px 20px;
            border: none;
            font-weight: bold;
            cursor: pointer;
            border-radius: 8px;
            font-size: 14px;
        }
        
        .btn-green {
            background: #00ff88;
            color: #000;
        }
        
        .btn-red {
            background: #ff0000;
            color: white;
        }
        
        .btn-red.recording {
            animation: pulse 1s infinite;
        }
        
        .btn-dark {
            background: #333;
            color: white;
        }
        
        .btn-gray {
            background: #555;
            color: white;
        }
        
        .model-selector, .marker-selector {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        
        .model-option, .marker-option {
            background: #222;
            padding: 8px 15px;
            cursor: pointer;
            border-radius: 8px;
            color: white;
            font-size: 12px;
        }
        
        .model-option.active, .marker-option.active {
            background: #00ff88;
            color: #000;
        }
        
        .scale-control {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #222;
            padding: 5px 12px;
            border-radius: 8px;
        }
        
        .scale-control label {
            color: #aaa;
            font-size: 12px;
        }
        
        .status-bar {
            position: fixed;
            top: 10px;
            left: 10px;
            right: 10px;
            background: rgba(0,0,0,0.7);
            padding: 10px;
            border-radius: 10px;
            z-index: 100;
            display: none;
            font-size: 12px;
            color: #00ff88;
            text-align: center;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.8; }
        }
        
        @media (max-width: 768px) {
            .control-panel {
                flex-direction: column;
                gap: 8px;
            }
            .model-selector, .marker-selector {
                justify-content: center;
            }
        }
    </style>
    
    <!-- A-Frame y AR.js -->
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/aframe-ar.js@3.0.2/aframe-ar.min.js"></script>
</head>
<body>
    <!-- Pantalla de inicio -->
    <div class="start-screen" id="startScreen">
        <div class="start-card">
            <h1>🎨 AR STUDIO</h1>
            <p>Realidad Aumentada Personalizable</p>
            <div class="instructions">
                <ul style="list-style: none;">
                    <li>📸 1. Permite acceso a la cámara</li>
                    <li>🎯 2. Enfoca el marcador HIRO impreso</li>
                    <li>🌍 3. O usa WORLD TRACKING</li>
                    <li>🎥 4. Graba video o toma fotos</li>
                </ul>
            </div>
            <button class="start-btn" id="startBtn">▶ INICIAR AR</button>
        </div>
    </div>
    
    <!-- Barra de estado -->
    <div class="status-bar" id="statusBar">
        <span id="statusText">● INICIANDO...</span>
    </div>
    
    <!-- Panel de control -->
    <div class="control-panel" id="controlPanel">
        <div class="model-selector" id="modelSelector">
            <div class="model-option active" data-model="box">📦 CUBO</div>
            <div class="model-option" data-model="sphere">⚪ ESFERA</div>
            <div class="model-option" data-model="torus">🌀 TORO</div>
        </div>
        
        <div class="marker-selector" id="markerSelector">
            <div class="marker-option active" data-marker="hiro">🎯 HIRO</div>
            <div class="marker-option" data-marker="kanji">📜 KANJI</div>
        </div>
        
        <div class="scale-control">
            <label>🔍 ESCALA</label>
            <input type="range" id="scaleSlider" min="0.2" max="1.5" step="0.05" value="0.8">
            <span id="scaleValue" style="color:#00ff88;">0.8</span>
        </div>
        
        <div style="display: flex; gap: 10px;">
            <button class="btn btn-green" id="trackingBtn">🌍 WORLD</button>
            <button class="btn btn-dark" id="photoBtn">📷 FOTO</button>
            <button class="btn btn-red" id="recordBtn">🔴 GRABAR</button>
            <button class="btn btn-gray" id="resetBtn">⟳ RESET</button>
        </div>
    </div>
    
    <!-- Escena AR -->
    <a-scene 
        id="arScene"
        embedded
        arjs="sourceType: webcam; debugUIEnabled: false;"
        vr-mode-ui="enabled: false"
    >
        <!-- Marcador para Image Tracking -->
        <a-marker id="imageMarker" preset="hiro">
            <a-entity id="imageModel">
                <a-box color="#00ff88" depth="0.5" height="0.5" width="0.5"></a-box>
            </a-entity>
        </a-marker>
        
        <!-- Entidad para World Tracking -->
        <a-entity id="worldModel" visible="false">
            <a-box color="#00ff88" depth="0.4" height="0.4" width="0.4"></a-box>
        </a-entity>
        
        <!-- Luces -->
        <a-light type="ambient" intensity="0.6"></a-light>
        <a-light type="directional" intensity="0.8" position="5 10 7"></a-light>
    </a-scene>
    
    <script>
        // ============================================
        // ELEMENTOS DOM
        // ============================================
        const startScreen = document.getElementById('startScreen');
        const startBtn = document.getElementById('startBtn');
        const controlPanel = document.getElementById('controlPanel');
        const statusBar = document.getElementById('statusBar');
        const statusText = document.getElementById('statusText');
        const scaleSlider = document.getElementById('scaleSlider');
        const scaleValue = document.getElementById('scaleValue');
        const trackingBtn = document.getElementById('trackingBtn');
        const photoBtn = document.getElementById('photoBtn');
        const recordBtn = document.getElementById('recordBtn');
        const resetBtn = document.getElementById('resetBtn');
        
        // Elementos AR
        const imageMarker = document.getElementById('imageMarker');
        const imageModel = document.getElementById('imageModel');
        const worldModel = document.getElementById('worldModel');
        
        // Estado
        let currentTracking = 'image'; // 'image' o 'world'
        let currentModelType = 'box';
        let currentMarker = 'hiro';
        let worldPlaced = false;
        let isRecording = false;
        let mediaRecorder = null;
        let recordedChunks = [];
        
        // ============================================
        // FUNCIONES DE MODELOS
        // ============================================
        
        function createModelElement(type, scale) {
            const entity = document.createElement('a-entity');
            
            if (type === 'box') {
                const box = document.createElement('a-box');
                box.setAttribute('color', '#00ff88');
                box.setAttribute('depth', '0.5');
                box.setAttribute('height', '0.5');
                box.setAttribute('width', '0.5');
                box.setAttribute('scale', `${scale} ${scale} ${scale}`);
                entity.appendChild(box);
            } else if (type === 'sphere') {
                const sphere = document.createElement('a-sphere');
                sphere.setAttribute('color', '#ff6600');
                sphere.setAttribute('radius', '0.3');
                sphere.setAttribute('scale', `${scale} ${scale} ${scale}`);
                entity.appendChild(sphere);
            } else if (type === 'torus') {
                const torus = document.createElement('a-torus');
                torus.setAttribute('color', '#ff3366');
                torus.setAttribute('radius', '0.3');
                torus.setAttribute('radius-tubular', '0.05');
                torus.setAttribute('scale', `${scale} ${scale} ${scale}`);
                entity.appendChild(torus);
            }
            
            return entity;
        }
        
        function updateModel(type, scale) {
            // Limpiar modelos actuales
            while (imageModel.firstChild) imageModel.removeChild(imageModel.firstChild);
            while (worldModel.firstChild) worldModel.removeChild(worldModel.firstChild);
            
            // Crear nuevos modelos
            const imageEntity = createModelElement(type, scale);
            const worldEntity = createModelElement(type, scale);
            
            imageModel.appendChild(imageEntity);
            worldModel.appendChild(worldEntity);
        }
        
        // ============================================
        // FUNCIONES DE TRACKING
        // ============================================
        
        function setTrackingMode(mode) {
            currentTracking = mode;
            
            if (mode === 'image') {
                imageMarker.setAttribute('visible', 'true');
                worldModel.setAttribute('visible', 'false');
                worldPlaced = false;
                trackingBtn.textContent = '🌍 WORLD';
                trackingBtn.style.background = '#333';
                statusText.innerHTML = `🖼️ IMAGE TRACKING | Enfoca marcador ${currentMarker.toUpperCase()}`;
            } else {
                imageMarker.setAttribute('visible', 'false');
                worldModel.setAttribute('visible', 'true');
                trackingBtn.textContent = '🖼️ IMAGE';
                trackingBtn.style.background = '#00ff88';
                trackingBtn.style.color = '#000';
                statusText.innerHTML = `🌍 WORLD TRACKING | Toca pantalla para colocar modelo`;
            }
        }
        
        function placeWorldModel() {
            if (!worldPlaced && currentTracking === 'world') {
                worldModel.setAttribute('position', '0 0 -1.5');
                worldPlaced = true;
                statusText.innerHTML = '✅ Modelo colocado! Puedes moverte alrededor';
            }
        }
        
        function resetWorldModel() {
            if (currentTracking === 'world') {
                worldPlaced = false;
                worldModel.setAttribute('position', '0 0 0');
                statusText.innerHTML = '🔄 Posición reseteada. Toca para colocar';
            }
        }
        
        // ============================================
        // FUNCIONES DE GRABACIÓN
        // ============================================
        
        async function startRecording() {
            try {
                const canvas = document.querySelector('a-scene').canvas;
                if (!canvas) throw new Error('Canvas no disponible');
                
                const stream = canvas.captureStream(30);
                mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm' });
                recordedChunks = [];
                
                mediaRecorder.ondataavailable = (e) => {
                    if (e.data.size > 0) recordedChunks.push(e.data);
                };
                
                mediaRecorder.onstop = () => {
                    const blob = new Blob(recordedChunks, { type: 'video/webm' });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `ar-video-${Date.now()}.webm`;
                    a.click();
                    URL.revokeObjectURL(url);
                    statusText.innerHTML = '✅ Video guardado';
                };
                
                mediaRecorder.start(1000);
                isRecording = true;
                recordBtn.classList.add('recording');
                recordBtn.textContent = '⏹️ DETENER';
                statusText.innerHTML = '🔴 GRABANDO VIDEO...';
                
            } catch (error) {
                console.error(error);
                statusText.innerHTML = '❌ Error al grabar';
            }
        }
        
        function stopRecording() {
            if (mediaRecorder && isRecording) {
                mediaRecorder.stop();
                isRecording = false;
                recordBtn.classList.remove('recording');
                recordBtn.textContent = '🔴 GRABAR';
                statusText.innerHTML = '✅ Grabación finalizada';
            }
        }
        
        async function takePhoto() {
            try {
                const canvas = document.querySelector('a-scene').canvas;
                if (!canvas) throw new Error('Canvas no disponible');
                
                const link = document.createElement('a');
                link.download = `ar-photo-${Date.now()}.png`;
                link.href = canvas.toDataURL('image/png');
                link.click();
                statusText.innerHTML = '📸 Foto guardada';
                
            } catch (error) {
                console.error(error);
                statusText.innerHTML = '❌ Error al tomar foto';
            }
        }
        
        // ============================================
        // INICIALIZACIÓN
        // ============================================
        
        async function initAR() {
            statusText.innerHTML = '📷 Solicitando cámara...';
            
            try {
                // Solicitar permiso de cámara explícitamente
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: 'environment' } 
                });
                stream.getTracks().forEach(track => track.stop());
                
                // Mostrar UI
                startScreen.style.display = 'none';
                controlPanel.style.display = 'flex';
                statusBar.style.display = 'block';
                statusText.innerHTML = '✅ AR ACTIVO | Cámara lista';
                
                // Configurar tracking inicial
                setTrackingMode('image');
                
                // Configurar marcador
                imageMarker.setAttribute('preset', 'hiro');
                
                // Esperar a que AR.js cargue la cámara
                setTimeout(() => {
                    const scene = document.querySelector('a-scene');
                    scene.addEventListener('arjs-video-loaded', () => {
                        statusText.innerHTML = '📷 Cámara activa | Enfoca el marcador HIRO';
                    });
                }, 1000);
                
            } catch (error) {
                console.error('Error de cámara:', error);
                statusText.innerHTML = '❌ Permiso de cámara denegado. Reinicia y acepta los permisos.';
                alert('Necesitamos acceso a la cámara para usar Realidad Aumentada. Por favor, acepta el permiso.');
            }
        }
        
        // ============================================
        // EVENTOS UI
        // ============================================
        
        startBtn.addEventListener('click', initAR);
        
        // Selección de modelos
        document.querySelectorAll('.model-option').forEach(opt => {
            opt.addEventListener('click', () => {
                document.querySelectorAll('.model-option').forEach(o => o.classList.remove('active'));
                opt.classList.add('active');
                currentModelType = opt.dataset.model;
                const scale = parseFloat(scaleSlider.value);
                updateModel(currentModelType, scale);
                statusText.innerHTML = `🎨 Modelo: ${opt.textContent.trim()}`;
            });
        });
        
        // Selección de marcadores
        document.querySelectorAll('.marker-option').forEach(opt => {
            opt.addEventListener('click', () => {
                document.querySelectorAll('.marker-option').forEach(o => o.classList.remove('active'));
                opt.classList.add('active');
                currentMarker = opt.dataset.marker;
                imageMarker.setAttribute('preset', currentMarker);
                statusText.innerHTML = `🏷️ Marcador: ${currentMarker.toUpperCase()}`;
            });
        });
        
        // Control de escala
        scaleSlider.addEventListener('input', (e) => {
            const scale = parseFloat(e.target.value);
            scaleValue.textContent = scale.toFixed(2);
            
            if (currentTracking === 'image') {
                const modelEntity = imageModel.firstChild;
                if (modelEntity) modelEntity.setAttribute('scale', `${scale} ${scale} ${scale}`);
            } else {
                const modelEntity = worldModel.firstChild;
                if (modelEntity) modelEntity.setAttribute('scale', `${scale} ${scale} ${scale}`);
            }
        });
        
        // Botón de tracking
        trackingBtn.addEventListener('click', () => {
            if (currentTracking === 'image') {
                setTrackingMode('world');
            } else {
                setTrackingMode('image');
            }
        });
        
        // Botones de grabación
        recordBtn.addEventListener('click', () => {
            if (isRecording) {
                stopRecording();
            } else {
                startRecording();
            }
        });
        
        photoBtn.addEventListener('click', takePhoto);
        resetBtn.addEventListener('click', resetWorldModel);
        
        // Tocar pantalla para world tracking
        document.addEventListener('click', (e) => {
            if (e.target.closest('.control-panel')) return;
            if (currentTracking === 'world' && !worldPlaced) {
                placeWorldModel();
            }
        });
        
        // Modelo inicial
        updateModel('box', 0.8);
        
        console.log('%c🎨 AR STUDIO - Listo!', 'color: #00ff88; font-size: 14px');
        console.log('📌 Para usar: Imprime el marcador HIRO desde: https://jeromeetienne.github.io/AR.js/data/images/HIRO.jpg');
    </script>
</body>
</html>
