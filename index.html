<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AR Studio - Realidad Aumentada Personalizable</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    
    <!-- A-Frame y AR.js -->
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/aframe-ar.js@3.0.2/aframe-ar.min.js"></script>
    
    <!-- RecordRTC para grabación -->
    <script src="https://cdn.jsdelivr.net/npm/recordrtc@5.6.2/RecordRTC.min.js"></script>
    
    <!-- html2canvas para captura de fotos -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: #000;
            overflow: hidden;
            position: fixed;
            width: 100%;
            height: 100%;
        }
        
        /* Pantalla de inicio */
        .start-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
            z-index: 2000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 0.5s ease;
        }
        
        .logo {
            text-align: center;
            margin-bottom: 40px;
        }
        
        .logo h1 {
            font-size: 3rem;
            font-weight: 700;
            background: linear-gradient(135deg, #00ff88, #00ccff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .logo p {
            color: #888;
            margin-top: 10px;
        }
        
        .instructions {
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            padding: 25px;
            margin: 20px;
            max-width: 350px;
            backdrop-filter: blur(10px);
        }
        
        .instructions h3 {
            color: #00ff88;
            margin-bottom: 15px;
        }
        
        .instructions li {
            color: #ccc;
            margin: 10px 0;
            margin-left: 20px;
        }
        
        .start-btn {
            background: linear-gradient(135deg, #00ff88, #00ccff);
            border: none;
            padding: 16px 48px;
            border-radius: 40px;
            font-size: 1.2rem;
            font-weight: 600;
            color: #000;
            cursor: pointer;
            margin-top: 20px;
            transition: transform 0.2s;
        }
        
        .start-btn:active {
            transform: scale(0.98);
        }
        
        /* UI Principal */
        .ui-container {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255,255,255,0.1);
            padding: 12px 16px;
            z-index: 1000;
            display: none;
            flex-direction: column;
            gap: 12px;
        }
        
        /* Pestañas */
        .tabs {
            display: flex;
            gap: 8px;
            background: rgba(255,255,255,0.05);
            padding: 4px;
            border-radius: 50px;
        }
        
        .tab-btn {
            flex: 1;
            padding: 10px;
            border: none;
            background: transparent;
            color: #aaa;
            font-weight: 600;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.85rem;
        }
        
        .tab-btn.active {
            background: #00ff88;
            color: #000;
        }
        
        /* Paneles */
        .panel {
            display: none;
            gap: 12px;
            flex-wrap: wrap;
            max-height: 200px;
            overflow-y: auto;
        }
        
        .panel.active {
            display: flex;
        }
        
        /* Items de modelo/marcador */
        .model-item, .marker-item {
            background: rgba(255,255,255,0.08);
            border-radius: 12px;
            padding: 10px 15px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid transparent;
        }
        
        .model-item.active, .marker-item.active {
            border-color: #00ff88;
            background: rgba(0,255,136,0.1);
        }
        
        .model-preview, .marker-preview {
            width: 40px;
            height: 40px;
            background: #333;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
        }
        
        .model-info, .marker-info {
            flex: 1;
        }
        
        .model-name, .marker-name {
            color: white;
            font-weight: 500;
            font-size: 0.85rem;
        }
        
        .model-type, .marker-type {
            color: #888;
            font-size: 0.7rem;
        }
        
        /* Controles */
        .controls-row {
            display: flex;
            gap: 12px;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
        }
        
        .scale-control {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(255,255,255,0.05);
            padding: 8px 15px;
            border-radius: 40px;
        }
        
        .scale-control label {
            color: #aaa;
            font-size: 0.8rem;
        }
        
        .scale-control input {
            width: 120px;
        }
        
        .action-buttons {
            display: flex;
            gap: 12px;
        }
        
        .action-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
        }
        
        .record-btn {
            background: #ff0000;
            color: white;
        }
        
        .record-btn.recording {
            animation: pulse 1s infinite;
        }
        
        .photo-btn {
            background: #333;
            color: white;
        }
        
        .reset-btn {
            background: #ff4444;
            color: white;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.8; }
        }
        
        /* Barra de estado */
        .status-bar {
            position: fixed;
            top: 10px;
            left: 10px;
            right: 10px;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(10px);
            padding: 10px 15px;
            border-radius: 30px;
            z-index: 1000;
            display: none;
            font-size: 0.75rem;
            color: #00ff88;
            text-align: center;
        }
        
        /* Scrollbar personalizado */
        .panel::-webkit-scrollbar {
            width: 4px;
        }
        
        .panel::-webkit-scrollbar-track {
            background: #1a1a1a;
            border-radius: 4px;
        }
        
        .panel::-webkit-scrollbar-thumb {
            background: #00ff88;
            border-radius: 4px;
        }
        
        @media (min-width: 768px) {
            .ui-container {
                left: auto;
                right: 20px;
                bottom: 20px;
                width: 380px;
                border-radius: 24px;
                border: 1px solid rgba(255,255,255,0.1);
            }
        }
    </style>
</head>
<body>
    <!-- Pantalla de inicio -->
    <div class="start-screen" id="startScreen">
        <div class="logo">
            <h1>AR STUDIO</h1>
            <p>Realidad Aumentada Personalizable</p>
        </div>
        <div class="instructions">
            <h3>📱 CÓMO USAR</h3>
            <ul>
                <li>📸 Permite acceso a la cámara</li>
                <li>🖼️ IMAGE TRACKING: Enfoca el marcador</li>
                <li>🌍 WORLD TRACKING: Toca donde colocar</li>
                <li>🎨 Selecciona modelos y marcadores</li>
                <li>🎥 Graba video o toma fotos</li>
            </ul>
        </div>
        <button class="start-btn" id="startBtn">INICIAR EXPERIENCIA</button>
    </div>
    
    <!-- Barra de estado -->
    <div class="status-bar" id="statusBar">
        <span id="statusText">● SISTEMA LISTO</span>
    </div>
    
    <!-- UI Principal -->
    <div class="ui-container" id="uiContainer">
        <!-- Pestañas -->
        <div class="tabs">
            <button class="tab-btn active" data-tab="models">📦 MODELOS</button>
            <button class="tab-btn" data-tab="markers">🏷️ MARCADORES</button>
            <button class="tab-btn" data-tab="tracking">🎯 TRACKING</button>
        </div>
        
        <!-- Panel de Modelos -->
        <div class="panel" id="modelsPanel">
            <!-- Los modelos se cargarán dinámicamente -->
        </div>
        
        <!-- Panel de Marcadores -->
        <div class="panel" id="markersPanel">
            <!-- Los marcadores se cargarán dinámicamente -->
        </div>
        
        <!-- Panel de Tracking -->
        <div class="panel" id="trackingPanel">
            <div class="controls-row">
                <div class="scale-control">
                    <label>🔍 ESCALA</label>
                    <input type="range" id="scaleSlider" min="0.1" max="3" step="0.05" value="0.8">
                    <span id="scaleValue" style="color:#00ff88; width:35px;">0.8</span>
                </div>
                <div class="action-buttons">
                    <button class="action-btn photo-btn" id="photoBtn">📷</button>
                    <button class="action-btn record-btn" id="recordBtn">🔴</button>
                    <button class="action-btn reset-btn" id="resetBtn">⟳</button>
                </div>
            </div>
            <div id="stopBtn" style="display:none;">
                <button class="action-btn" style="background:#333; width:100%;" id="stopRecordingBtn">⏹️ DETENER</button>
            </div>
        </div>
    </div>
    
    <!-- Escena AR -->
    <a-scene 
        id="arScene"
        embedded 
        arjs='sourceType: webcam; debugUIEnabled: false; detectionMode: mono_and_matrix; matrixCodeType: 3x3;'
        renderer='logarithmicDepthBuffer: true'
        vr-mode-ui='enabled: false'
        device-orientation-permission-ui='enabled: false'
    >
        <!-- Cámara -->
        <a-entity id="arCamera" camera position="0 1.6 0" look-controls></a-entity>
        
        <!-- Contenedor de modelos de imagen tracking -->
        <a-marker id="activeImageMarker" preset="hiro" smooth="true" visible="false">
            <a-entity id="imageTrackedModel"></a-entity>
        </a-marker>
        
        <!-- Contenedor de modelo world tracking -->
        <a-entity id="worldTrackedModel" visible="false">
            <a-box color="#00ff88" depth="0.4" height="0.4" width="0.4" material="roughness:0.3"></a-box>
        </a-entity>
        
        <!-- Luces -->
        <a-light type="ambient" intensity="0.6"></a-light>
        <a-light type="directional" intensity="0.8" position="5 10 7"></a-light>
    </a-scene>
    
    <script>
        // ============================================
        // CONFIGURACIÓN INICIAL
        // ============================================
        
        // Elementos DOM
        const startScreen = document.getElementById('startScreen');
        const startBtn = document.getElementById('startBtn');
        const uiContainer = document.getElementById('uiContainer');
        const statusBar = document.getElementById('statusBar');
        const statusText = document.getElementById('statusText');
        const modelsPanel = document.getElementById('modelsPanel');
        const markersPanel = document.getElementById('markersPanel');
        const scaleSlider = document.getElementById('scaleSlider');
        const scaleValue = document.getElementById('scaleValue');
        const recordBtn = document.getElementById('recordBtn');
        const photoBtn = document.getElementById('photoBtn');
        const resetBtn = document.getElementById('resetBtn');
        const stopRecordingBtn = document.getElementById('stopRecordingBtn');
        
        // Elementos AR
        const activeImageMarker = document.getElementById('activeImageMarker');
        const imageTrackedModel = document.getElementById('imageTrackedModel');
        const worldTrackedModel = document.getElementById('worldTrackedModel');
        
        // Estado
        let currentTracking = 'image';
        let currentModelUrl = null;
        let currentModelName = null;
        let currentMarkerType = 'hiro';
        let currentMarkerUrl = null;
        let worldPlaced = false;
        let isRecording = false;
        let recordRTC = null;
        let stream = null;
        
        // ============================================
        // CARGA DINÁMICA DE MODELOS
        // ============================================
        
        // Lista de modelos predefinidos + los que encuentre en la carpeta models
        const modelLibrary = [
            { name: 'Cubo Demo', type: 'primitive', url: null, icon: '📦', primitive: 'box', color: '#00ff88' },
            { name: 'Esfera Demo', type: 'primitive', url: null, icon: '⚪', primitive: 'sphere', color: '#ff6600' },
            { name: 'Toro Demo', type: 'primitive', url: null, icon: '🌀', primitive: 'torus', color: '#ff3366' }
        ];
        
        // Escanear modelos disponibles en la carpeta models/
        async function scanModels() {
            // Modelos GLTF predefinidos que podrías tener
            const gltfModels = [
                { name: 'Árbol', file: 'MaizToken-11.gltf', icon: '🌳' },
                { name: 'Robot', file: 'MaizToken-15.gltf', icon: '🤖' },
                { name: 'Nave', file: 'MaizToken-16.gltf', icon: '🚀' },
                { name: 'Personaje', file: 'MaizToken-18.gltf', icon: '🧑' }
            ];
            
            // Agregar modelos GLTF a la librería
            for (const model of gltfModels) {
                const url = `models/${model.file}`;
                // Verificar si existe (intentando cargar)
                try {
                    const response = await fetch(url, { method: 'HEAD' });
                    if (response.ok) {
                        modelLibrary.push({
                            name: model.name,
                            type: 'gltf',
                            url: url,
                            icon: model.icon,
                            primitive: null
                        });
                    }
                } catch(e) {
                    console.log(`Modelo ${model.file} no encontrado`);
                }
            }
        }
        
        // Renderizar modelos en UI
        function renderModels() {
            modelsPanel.innerHTML = '';
            modelLibrary.forEach(model => {
                const modelDiv = document.createElement('div');
                modelDiv.className = 'model-item';
                if (currentModelName === model.name) modelDiv.classList.add('active');
                modelDiv.innerHTML = `
                    <div class="model-preview">${model.icon}</div>
                    <div class="model-info">
                        <div class="model-name">${model.name}</div>
                        <div class="model-type">${model.type.toUpperCase()}</div>
                    </div>
                `;
                modelDiv.addEventListener('click', () => loadModel(model));
                modelsPanel.appendChild(modelDiv);
            });
        }
        
        // Cargar modelo seleccionado
        function loadModel(model) {
            currentModelName = model.name;
            currentModelUrl = model.url;
            
            // Actualizar UI
            document.querySelectorAll('.model-item').forEach(item => item.classList.remove('active'));
            event.target.closest('.model-item')?.classList.add('active');
            
            if (currentTracking === 'image') {
                // Cargar en image tracking
                imageTrackedModel.innerHTML = '';
                
                if (model.type === 'primitive') {
                    const entity = document.createElement(`a-${model.primitive}`);
                    entity.setAttribute('color', model.color);
                    entity.setAttribute('scale', `${scaleSlider.value} ${scaleSlider.value} ${scaleSlider.value}`);
                    if (model.primitive === 'box') entity.setAttribute('depth', '0.5');
                    if (model.primitive === 'box') entity.setAttribute('height', '0.5');
                    if (model.primitive === 'box') entity.setAttribute('width', '0.5');
                    if (model.primitive === 'sphere') entity.setAttribute('radius', '0.3');
                    if (model.primitive === 'torus') entity.setAttribute('radius', '0.3');
                    imageTrackedModel.appendChild(entity);
                } else if (model.type === 'gltf' && model.url) {
                    const entity = document.createElement('a-entity');
                    entity.setAttribute('gltf-model', model.url);
                    entity.setAttribute('scale', `${scaleSlider.value} ${scaleSlider.value} ${scaleSlider.value}`);
                    imageTrackedModel.appendChild(entity);
                }
                
                statusText.innerHTML = `● MODELO CARGADO: ${model.name}`;
            } else {
                // Cargar en world tracking
                worldTrackedModel.innerHTML = '';
                
                if (model.type === 'primitive') {
                    const entity = document.createElement(`a-${model.primitive}`);
                    entity.setAttribute('color', model.color);
                    entity.setAttribute('scale', `${scaleSlider.value} ${scaleSlider.value} ${scaleSlider.value}`);
                    if (model.primitive === 'box') {
                        entity.setAttribute('depth', '0.4');
                        entity.setAttribute('height', '0.4');
                        entity.setAttribute('width', '0.4');
                    }
                    if (model.primitive === 'sphere') entity.setAttribute('radius', '0.25');
                    if (model.primitive === 'torus') entity.setAttribute('radius', '0.3');
                    worldTrackedModel.appendChild(entity);
                } else if (model.type === 'gltf' && model.url) {
                    const entity = document.createElement('a-entity');
                    entity.setAttribute('gltf-model', model.url);
                    entity.setAttribute('scale', `${scaleSlider.value} ${scaleSlider.value} ${scaleSlider.value}`);
                    worldTrackedModel.appendChild(entity);
                }
                
                statusText.innerHTML = `● MODELO LISTO PARA COLOCAR: ${model.name}`;
            }
        }
        
        // ============================================
        // CARGA DINÁMICA DE MARCADORES
        // ============================================
        
        const markerLibrary = [
            { name: 'HIRO', type: 'preset', value: 'hiro', icon: '🎯', url: null },
            { name: 'KANJI', type: 'preset', value: 'kanji', icon: '📜', url: null }
        ];
        
        function renderMarkers() {
            markersPanel.innerHTML = '';
            markerLibrary.forEach(marker => {
                const markerDiv = document.createElement('div');
                markerDiv.className = 'marker-item';
                if (currentMarkerType === marker.value) markerDiv.classList.add('active');
                markerDiv.innerHTML = `
                    <div class="marker-preview">${marker.icon}</div>
                    <div class="marker-info">
                        <div class="marker-name">${marker.name}</div>
                        <div class="marker-type">${marker.type.toUpperCase()}</div>
                    </div>
                `;
                markerDiv.addEventListener('click', () => selectMarker(marker));
                markersPanel.appendChild(markerDiv);
            });
        }
        
        function selectMarker(marker) {
            currentMarkerType = marker.value;
            currentMarkerUrl = marker.url;
            
            document.querySelectorAll('.marker-item').forEach(item => item.classList.remove('active'));
            event.target.closest('.marker-item')?.classList.add('active');
            
            if (marker.type === 'preset') {
                activeImageMarker.setAttribute('preset', marker.value);
                activeImageMarker.setAttribute('type', 'preset');
                activeImageMarker.removeAttribute('url');
            } else if (marker.type === 'pattern' && marker.url) {
                activeImageMarker.setAttribute('type', 'pattern');
                activeImageMarker.setAttribute('url', marker.url);
                activeImageMarker.removeAttribute('preset');
            }
            
            statusText.innerHTML = `● MARCADOR SELECCIONADO: ${marker.name}`;
        }
        
        // ============================================
        // TRACKING MODES
        // ============================================
        
        function setTrackingMode(mode) {
            currentTracking = mode;
            
            if (mode === 'image') {
                activeImageMarker.setAttribute('visible', 'true');
                worldTrackedModel.setAttribute('visible', 'false');
                worldPlaced = false;
                statusText.innerHTML = `● MODO IMAGE TRACKING | Enfoca el marcador ${currentMarkerType.toUpperCase()}`;
            } else {
                activeImageMarker.setAttribute('visible', 'false');
                worldTrackedModel.setAttribute('visible', 'true');
                statusText.innerHTML = '● MODO WORLD TRACKING | Toca la pantalla para colocar el modelo';
            }
        }
        
        function placeWorldModel() {
            if (!worldPlaced && currentTracking === 'world') {
                const cameraEl = document.querySelector('[camera]');
                if (cameraEl && cameraEl.object3D) {
                    const forward = new THREE.Vector3(0, 0, -1);
                    forward.applyQuaternion(cameraEl.object3D.quaternion);
                    
                    const posX = cameraEl.object3D.position.x + forward.x * 1.5;
                    const posZ = cameraEl.object3D.position.z + forward.z * 1.5;
                    
                    worldTrackedModel.setAttribute('position', `${posX} 0 ${posZ}`);
                    worldPlaced = true;
                    
                    // Animación de aparición
                    worldTrackedModel.setAttribute('animation', 'property: scale; from: 0 0 0; to: 0.8 0.8 0.8; dur: 300');
                    setTimeout(() => worldTrackedModel.removeAttribute('animation'), 350);
                    
                    statusText.innerHTML = '✅ MODELO COLOCADO | Puedes moverte alrededor';
                }
            }
        }
        
        function resetWorldModel() {
            if (currentTracking === 'world') {
                worldPlaced = false;
                statusText.innerHTML = '● POSICIÓN RESETEADA | Toca para colocar nuevamente';
            }
        }
        
        // Actualizar escala
        function updateScale(value) {
            const scale = parseFloat(value);
            scaleValue.textContent = scale.toFixed(2);
            
            if (currentTracking === 'image') {
                imageTrackedModel.setAttribute('scale', `${scale} ${scale} ${scale}`);
            } else {
                worldTrackedModel.setAttribute('scale', `${scale} ${scale} ${scale}`);
            }
        }
        
        // ============================================
        // GRABACIÓN DE VIDEO Y FOTOS
        // ============================================
        
        async function startRecording() {
            try {
                const canvas = document.querySelector('a-scene').canvas;
                if (!canvas) throw new Error('Canvas no disponible');
                
                stream = canvas.captureStream(30);
                recordRTC = new RecordRTC(stream, {
                    type: 'video',
                    mimeType: 'video/webm',
                    bitsPerSecond: 5000000
                });
                
                recordRTC.startRecording();
                isRecording = true;
                
                recordBtn.classList.add('recording');
                recordBtn.style.display = 'none';
                document.getElementById('stopBtn').style.display = 'block';
                statusText.innerHTML = '🔴 GRABANDO VIDEO...';
                
            } catch (error) {
                console.error(error);
                statusText.innerHTML = '❌ Error al grabar';
            }
        }
        
        function stopRecording() {
            if (recordRTC && isRecording) {
                recordRTC.stopRecording(() => {
                    const blob = recordRTC.getBlob();
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `ar-video-${Date.now()}.webm`;
                    a.click();
                    URL.revokeObjectURL(url);
                    
                    if (stream) stream.getTracks().forEach(t => t.stop());
                    recordRTC = null;
                    isRecording = false;
                    
                    recordBtn.classList.remove('recording');
                    recordBtn.style.display = 'block';
                    document.getElementById('stopBtn').style.display = 'none';
                    statusText.innerHTML = '✅ VIDEO GUARDADO';
                });
            }
        }
        
        async function takePhoto() {
            try {
                const scene = document.querySelector('a-scene');
                const canvas = scene.canvas;
                
                // Crear un canvas temporal para la foto
                const tempCanvas = document.createElement('canvas');
                tempCanvas.width = canvas.width;
                tempCanvas.height = canvas.height;
                const ctx = tempCanvas.getContext('2d');
                ctx.drawImage(canvas, 0, 0);
                
                // Descargar
                tempCanvas.toBlob(blob => {
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `ar-photo-${Date.now()}.jpg`;
                    a.click();
                    URL.revokeObjectURL(url);
                    statusText.innerHTML = '📸 FOTO GUARDADA';
                }, 'image/jpeg', 0.9);
                
            } catch (error) {
                console.error(error);
                statusText.innerHTML = '❌ Error al tomar foto';
            }
        }
        
        // ============================================
        // INICIALIZACIÓN
        // ============================================
        
        async function initApp() {
            // Escanear modelos disponibles
            await scanModels();
            renderModels();
            renderMarkers();
            
            // Configurar UI
            startScreen.style.opacity = '0';
            setTimeout(() => {
                startScreen.style.display = 'none';
                uiContainer.style.display = 'flex';
                statusBar.style.display = 'block';
            }, 500);
            
            // Configurar tracking inicial
            setTrackingMode('image');
            selectMarker(markerLibrary[0]);
            
            // Cargar modelo por defecto
            if (modelLibrary.length > 0) {
                loadModel(modelLibrary[0]);
            }
            
            statusText.innerHTML = '● AR LISTO | Selecciona modelos y marcadores';
        }
        
        // ============================================
        // EVENT LISTENERS
        // ============================================
        
        startBtn.addEventListener('click', initApp);
        
        // Pestañas
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
                document.getElementById(`${btn.dataset.tab}Panel`).classList.add('active');
            });
        });
        
        scaleSlider.addEventListener('input', (e) => updateScale(e.target.value));
        recordBtn.addEventListener('click', startRecording);
        stopRecordingBtn?.addEventListener('click', stopRecording);
        photoBtn.addEventListener('click', takePhoto);
        resetBtn.addEventListener('click', resetWorldModel);
        
        // Tocar pantalla para world tracking
        document.addEventListener('click', (e) => {
            if (e.target.closest('.ui-container')) return;
            if (currentTracking === 'world' && !worldPlaced) {
                placeWorldModel();
            }
        });
        
        // Instrucciones en consola
        console.log('%c🎨 AR STUDIO - Para agregar modelos:', 'color: #00ff88; font-size: 12px');
        console.log('1. Coloca archivos .gltf y .bin en carpeta /models/');
        console.log('2. Coloca marcadores .patt en carpeta /markers/');
        console.log('3. Los elementos aparecerán automáticamente en la UI');
    </script>
</body>
</html>
