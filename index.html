<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AR.JS | BRUTALIST INTERFACE</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <script src="https://unpkg.com/ccapture.js@1.1.0/build/CCapture.all.min.js"></script>
    
    <style>
        :root {
            --gray: #1a1a1a;
            --white: #f2f2f2;
            --green: #00ff41; /* Estética Matrix/Terminal */
        }

        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Helvetica Neue', sans-serif;
            background: var(--gray);
            color: var(--white);
        }

        /* --- UI BRUTALISTA --- */
        #ui-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            pointer-events: none;
            border: 10px solid var(--gray);
            box-sizing: border-box;
        }

        .brutalist-panel {
            pointer-events: auto;
            background: var(--white);
            color: var(--gray);
            border: 4px solid var(--gray);
            padding: 20px;
            text-transform: uppercase;
            font-weight: 900;
        }

        /* Menú de Inicio */
        #main-menu {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80%;
            max-width: 400px;
            text-align: center;
        }

        h1 { font-size: 2.5rem; line-height: 0.9; margin-bottom: 20px; }
        p { font-size: 0.8rem; margin-bottom: 30px; letter-spacing: 1px; }

        .btn-start {
            background: var(--green);
            color: var(--gray);
            padding: 15px 40px;
            border: 4px solid var(--gray);
            cursor: pointer;
            font-size: 1.2rem;
            box-shadow: 8px 8px 0px var(--gray);
            transition: 0.1s;
        }

        .btn-start:active {
            box-shadow: 0px 0px 0px var(--gray);
            transform: translate(4px, 4px);
        }

        /* Controles de Grabación */
        #rec-container {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            display: none;
            pointer-events: auto;
        }

        #rec-button {
            width: 70px;
            height: 70px;
            background: white;
            border-radius: 50%;
            border: 5px solid var(--gray);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        #rec-button div {
            width: 30px;
            height: 30px;
            background: #ff0000;
            border-radius: 50%;
            transition: 0.3s;
        }

        #rec-button.recording div {
            border-radius: 4px;
            transform: scale(0.8);
        }

        /* Instrucciones de Tracking */
        #tracking-info {
            position: fixed;
            top: 20px;
            right: 20px;
            font-size: 0.7rem;
            background: var(--gray);
            color: var(--green);
            padding: 5px 10px;
            display: none;
        }
    </style>
</head>
<body>

    <div id="ui-overlay">
        <div id="main-menu" class="brutalist-panel">
            <h1>SISTEMA_AR_v1.0</h1>
            <p>INSTRUCCIONES:<br>1. Apunte a la imagen de referencia.<br>2. Use gestos para escalar.<br>3. Capture la experiencia.</p>
            <button class="btn-start" onclick="initExperience()">INICIAR</button>
        </div>

        <div id="tracking-info">STATUS: SCANNING_ENVIRONMENT</div>

        <div id="rec-container">
            <div id="rec-button" onclick="toggleRecording()">
                <div></div>
            </div>
        </div>
    </div>

    <a-scene 
        embedded 
        arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono_and_matrix; matrixCodeType: 3x3;"
        renderer="logarithmicDepthBuffer: true; antialias: true;"
        vr-mode-ui="enabled: false"
        gesture-detector>

        <a-assets>
            <a-asset-item id="modelo" src="models/modelo001.gltf"></a-asset-item>
        </a-assets>

        <a-marker type="pattern" url="markers/imagen.patt" raycaster="objects: .clickable" emitevents="true" cursor="fuse: false; rayOrigin: mouse;">
            <a-entity
                id="model-target"
                gltf-model="#modelo"
                scale="0.5 0.5 0.5"
                position="0 0 0"
                class="clickable"
                gesture-handler>
            </a-entity>
        </a-marker>

        <a-entity camera></a-entity>

    </a-scene>

    <script>
        let isRecording = false;
        let capturer = new CCapture({ format: 'webm', framerate: 30 });

        function initExperience() {
            document.getElementById('main-menu').style.display = 'none';
            document.getElementById('rec-container').style.display = 'block';
            document.getElementById('tracking-info').style.display = 'block';
        }

        function toggleRecording() {
            const btn = document.getElementById('rec-button');
            if (!isRecording) {
                isRecording = true;
                btn.classList.add('recording');
                console.log("Grabación iniciada");
                // capturer.start(); // Requiere manejo de frames en el loop de renderizado
            } else {
                isRecording = false;
                btn.classList.remove('recording');
                console.log("Grabación finalizada");
                // capturer.stop();
                // capturer.save();
            }
        }

        // Script para manipulación táctil (Scale/Rotate)
        AFRAME.registerComponent('gesture-handler', {
            init: function () {
                this.el.addEventListener('click', () => {
                    this.el.setAttribute('scale', {x: 1.2, y: 1.2, z: 1.2});
                });
            }
        });
    </script>
</body>
</html>
