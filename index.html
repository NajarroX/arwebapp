<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>WebXR Debug - World Tracking Funcional</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: monospace;
        }
        #debug-panel {
            position: absolute;
            bottom: 10px;
            left: 10px;
            right: 10px;
            background: rgba(0,0,0,0.9);
            color: #0f0;
            padding: 10px;
            border-radius: 10px;
            font-size: 11px;
            z-index: 200;
            font-family: monospace;
            max-height: 200px;
            overflow-y: auto;
            pointer-events: none;
        }
        #info {
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 12px;
            border-radius: 10px;
            z-index: 100;
            font-size: 12px;
            text-align: center;
            pointer-events: none;
        }
        #controls {
            position: absolute;
            bottom: 220px;
            left: 10px;
            right: 10px;
            display: flex;
            gap: 10px;
            z-index: 100;
            justify-content: center;
        }
        button {
            padding: 12px 20px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            flex: 1;
        }
        button.danger {
            background: #f44336;
        }
        .reticle {
            position: absolute;
            width: 50px;
            height: 50px;
            border: 2px solid #0f0;
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 200;
            display: none;
        }
        .reticle::before {
            content: '';
            position: absolute;
            width: 10px;
            height: 10px;
            background: #0f0;
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
        .reticle::after {
            content: '';
            position: absolute;
            width: 70px;
            height: 70px;
            border: 1px solid rgba(0,255,0,0.5);
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
    </style>
</head>
<body>
    <div id="info">
        <strong>🔧 WebXR Debug - World Tracking</strong><br>
        <span id="statusMsg">Inicializando...</span>
    </div>
    <div id="controls">
        <button id="startAR">🎯 Iniciar AR</button>
        <button id="placeObject" style="display:none;">📍 Colocar Objeto</button>
        <button id="resetAR" class="danger" style="display:none;">🔄 Resetear</button>
    </div>
    <div id="debug-panel">
        <strong>📋 Debug Log:</strong><br>
        <div id="debugLog"></div>
    </div>
    <div class="reticle" id="reticle"></div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        
        // === CONFIGURACIÓN ===
        let scene, camera, renderer;
        let xrSession = null;
        let referenceSpace = null;
        let hitTestSource = null;
        let currentObject = null;
        let objectPlaced = false;
        
        // Elementos UI
        const debugDiv = document.getElementById('debugLog');
        const statusSpan = document.getElementById('statusMsg');
        const reticleDiv = document.getElementById('reticle');
        
        // Función para agregar logs al panel de depuración
        function addLog(message, type = 'info') {
            const timestamp = new Date().toLocaleTimeString();
            const colors = { info: '#0f0', error: '#f00', warning: '#ff0', success: '#0ff' };
            const logEntry = document.createElement('div');
            logEntry.style.color = colors[type] || colors.info;
            logEntry.style.margin = '2px 0';
            logEntry.style.fontSize = '10px';
            logEntry.innerHTML = `[${timestamp}] ${message}`;
            debugDiv.appendChild(logEntry);
            debugDiv.scrollTop = debugDiv.scrollHeight;
            console.log(`[${timestamp}] ${message}`);
        }
        
        function updateStatus(message) {
            statusSpan.innerHTML = message;
            addLog(message, 'info');
        }
        
        // === INICIALIZAR THREE.JS ===
        async function initThree() {
            addLog('Inicializando Three.js...', 'info');
            
            // Escena
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x111122);
            
            // Luces
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambientLight);
            
            const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
            dirLight.position.set(5, 10, 7);
            dirLight.castShadow = true;
            scene.add(dirLight);
            
            const backLight = new THREE.PointLight(0x4466cc, 0.4);
            backLight.position.set(0, 2, -3);
            scene.add(backLight);
            
            // Cámara normal (preview)
            camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 1.6, 2);
            
            // Renderer con soporte WebXR
            renderer = new THREE.WebGLRenderer({ antialias: true, preserveDrawingBuffer: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.shadowMap.enabled = true;
            document.body.appendChild(renderer.domElement);
            
            addLog('Three.js inicializado correctamente', 'success');
            
            // Crear un objeto de prueba visible (un cubo flotante para debug)
            createDebugObject();
            
            // Animación de preview
            function animatePreview() {
                if (!xrSession) {
                    // Rotar la cámara alrededor del objeto de debug
                    if (currentObject && !objectPlaced) {
                        const time = Date.now() * 0.002;
                        camera.position.x = Math.sin(time) * 2;
                        camera.position.z = Math.cos(time) * 2;
                        camera.lookAt(0, 0.5, 0);
                    }
                    renderer.render(scene, camera);
                }
                requestAnimationFrame(animatePreview);
            }
            animatePreview();
        }
        
        // Crear objeto de debug visible (un cubo colorido)
        function createDebugObject() {
            // Crear un grupo
            const group = new THREE.Group();
            
            // Cubo principal
            const geometry = new THREE.BoxGeometry(0.2, 0.2, 0.2);
            const material = new THREE.MeshStandardMaterial({ 
                color: 0xff6600,
                metalness: 0.7,
                roughness: 0.3,
                emissive: 0x442200
            });
            const cube = new THREE.Mesh(geometry, material);
            cube.castShadow = true;
            group.add(cube);
            
            // Esfera brillante alrededor
            const sphereGeo = new THREE.SphereGeometry(0.25, 32, 32);
            const sphereMat = new THREE.MeshStandardMaterial({ 
                color: 0x44aaff, 
                transparent: true, 
                opacity: 0.3,
                emissive: 0x2266aa
            });
            const sphere = new THREE.Mesh(sphereGeo, sphereMat);
            group.add(sphere);
            
            // Puntos alrededor
            const points = [];
            for (let i = 0; i < 8; i++) {
                const pointGeo = new THREE.SphereGeometry(0.02, 8, 8);
                const pointMat = new THREE.MeshStandardMaterial({ color: 0xffaa44 });
                const point = new THREE.Mesh(pointGeo, pointMat);
                group.add(point);
                points.push(point);
            }
            
            group.userData.points = points;
            group.userData.time = 0;
            
            currentObject = group;
            currentObject.visible = false;
            scene.add(currentObject);
            
            addLog('Objeto de debug creado (cubo naranja con esfera azul)', 'success');
            
            // Animación de los puntos
            function animatePoints() {
                if (currentObject && currentObject.visible) {
                    const time = Date.now() * 0.003;
                    const radius = 0.35;
                    currentObject.userData.points.forEach((point, i) => {
                        const angle = (i / 8) * Math.PI * 2 + time;
                        point.position.x = Math.cos(angle) * radius;
                        point.position.z = Math.sin(angle) * radius;
                        point.position.y = Math.sin(angle * 2) * 0.1;
                    });
                    
                    // Rotación suave del cubo
                    if (currentObject.children[0]) {
                        currentObject.children[0].rotation.y = time;
                        currentObject.children[0].rotation.x = time * 0.5;
                    }
                }
                requestAnimationFrame(animatePoints);
            }
            animatePoints();
        }
        
        // === INICIAR AR CON WEBXR ===
        async function startAR() {
            addLog('Verificando compatibilidad WebXR...', 'info');
            
            if (!navigator.xr) {
                updateStatus('❌ WebXR no disponible');
                addLog('ERROR: navigator.xr no existe', 'error');
                return;
            }
            
            // Verificar soporte de AR inmersivo
            const supported = await navigator.xr.isSessionSupported('immersive-ar');
            addLog(`immersive-ar soportado: ${supported}`, supported ? 'success' : 'error');
            
            if (!supported) {
                updateStatus('❌ Tu dispositivo no soporta AR inmersivo');
                addLog('Necesitas Chrome 81+ y ARCore instalado', 'warning');
                return;
            }
            
            updateStatus('🔍 Solicitando permisos de cámara...');
            
            try {
                // Crear sesión AR
                xrSession = await navigator.xr.requestSession('immersive-ar', {
                    requiredFeatures: ['hit-test'],
                    optionalFeatures: ['local-floor']
                });
                
                addLog('Sesión AR creada exitosamente', 'success');
                
                // Configurar renderer
                await renderer.xr.setSession(xrSession);
                addLog('Renderer configurado para XR', 'success');
                
                // Espacios de referencia
                referenceSpace = await xrSession.requestReferenceSpace('local');
                const viewerSpace = await xrSession.requestReferenceSpace('viewer');
                addLog('Espacios de referencia creados', 'success');
                
                // Fuente de hit testing
                hitTestSource = await xrSession.requestHitTestSource({ space: viewerSpace });
                addLog('Fuente de hit testing creada', 'success');
                
                // Eventos de la sesión
                xrSession.addEventListener('end', onSessionEnd);
                xrSession.addEventListener('select', onSelect);
                
                // Iniciar loop de renderizado XR
                renderer.setAnimationLoop(renderXRFrame);
                
                // Actualizar UI
                document.getElementById('startAR').style.display = 'none';
                document.getElementById('placeObject').style.display = 'block';
                document.getElementById('resetAR').style.display = 'block';
                
                updateStatus('✅ AR activo! Mueve la cámara para detectar superficies');
                addLog('AR funcionando correctamente - Mueve el dispositivo', 'success');
                
                // Mostrar retículo visual
                reticleDiv.style.display = 'block';
                
            } catch (error) {
                addLog(`ERROR al iniciar AR: ${error.message}`, 'error');
                updateStatus(`❌ Error: ${error.message}`);
            }
        }
        
        // Evento cuando termina la sesión
        function onSessionEnd(event) {
            addLog('Sesión AR finalizada', 'warning');
            renderer.setAnimationLoop(null);
            xrSession = null;
            hitTestSource = null;
            
            document.getElementById('startAR').style.display = 'block';
            document.getElementById('placeObject').style.display = 'none';
            document.getElementById('resetAR').style.display = 'none';
            reticleDiv.style.display = 'none';
            
            updateStatus('Sesión AR finalizada');
        }
        
        // Evento de selección (toque en pantalla)
        function onSelect(event) {
            addLog('📱 Toque detectado en pantalla', 'info');
            
            if (currentObject && !objectPlaced) {
                // Encontrar la posición del retículo en el mundo AR
                if (window.lastHitPose) {
                    // Posicionar el objeto en el punto del hit test
                    currentObject.position.copy(window.lastHitPose);
                    currentObject.visible = true;
                    objectPlaced = true;
                    
                    addLog(`✅ Objeto colocado en posición: x=${window.lastHitPose.x.toFixed(2)}, y=${window.lastHitPose.y.toFixed(2)}, z=${window.lastHitPose.z.toFixed(2)}`, 'success');
                    updateStatus('✅ Objeto colocado! Camina alrededor para verlo');
                    
                    // Animación de aparición
                    currentObject.scale.set(0, 0, 0);
                    let scale = 0;
                    function animateScale() {
                        scale += 0.05;
                        if (scale < 1) {
                            currentObject.scale.set(scale, scale, scale);
                            requestAnimationFrame(animateScale);
                        }
                    }
                    animateScale();
                    
                    document.getElementById('placeObject').style.display = 'none';
                } else {
                    addLog('No hay superficie detectada para colocar el objeto', 'warning');
                }
            } else if (objectPlaced) {
                addLog('El objeto ya está colocado. Usa Resetear para volver a colocar.', 'info');
            }
        }
        
        // Frame de renderizado XR - Hit testing
        let lastHitTime = 0;
        
        function renderXRFrame(time, frame) {
            if (!frame || !hitTestSource || !referenceSpace) return;
            
            // Obtener resultados del hit test
            const hitTestResults = frame.getHitTestResults(hitTestSource);
            
            if (hitTestResults.length > 0) {
                // Hay superficie detectada
                const hit = hitTestResults[0];
                const hitPose = hit.getPose(referenceSpace);
                
                if (hitPose) {
                    // Guardar la posición para cuando se toque
                    window.lastHitPose = hitPose.transform.position;
                    
                    // Actualizar retículo visual en CSS
                    // Convertir coordenadas del mundo a pantalla
                    const cameraPose = frame.getViewerPose(referenceSpace);
                    if (cameraPose) {
                        // Mostrar retículo verde
                        reticleDiv.style.borderColor = '#0f0';
                        reticleDiv.style.boxShadow = '0 0 10px rgba(0,255,0,0.5)';
                        
                        if (!objectPlaced && Date.now() - lastHitTime > 1000) {
                            lastHitTime = Date.now();
                            addLog(`Superficie detectada en: x=${hitPose.transform.position.x.toFixed(2)}, y=${hitPose.transform.position.y.toFixed(2)}, z=${hitPose.transform.position.z.toFixed(2)}`, 'success');
                            updateStatus('🎯 Superficie detectada! Toca para colocar el objeto');
                        }
                    }
                }
            } else {
                // No hay superficie
                reticleDiv.style.borderColor = '#ff0';
                reticleDiv.style.boxShadow = 'none';
                if (!objectPlaced) {
                    updateStatus('🔍 Moviendo cámara para detectar superficie...');
                }
            }
            
            // Renderizar la escena (Three.js lo hace automáticamente con setAnimationLoop)
        }
        
        // Resetear la escena
        function resetScene() {
            if (currentObject) {
                currentObject.visible = false;
                currentObject.scale.set(1, 1, 1);
                objectPlaced = false;
                addLog('Escena reseteada - Puedes colocar el objeto nuevamente', 'warning');
                updateStatus('🔄 Escena reseteada. Mueve la cámara para detectar superficie.');
                document.getElementById('placeObject').style.display = 'block';
            }
        }
        
        // === CONFIGURAR EVENTOS UI ===
        document.getElementById('startAR').addEventListener('click', startAR);
        document.getElementById('placeObject').addEventListener('click', () => {
            addLog('Botón "Colocar Objeto" presionado manualmente', 'info');
            if (window.lastHitPose && currentObject && !objectPlaced) {
                currentObject.position.copy(window.lastHitPose);
                currentObject.visible = true;
                objectPlaced = true;
                addLog('Objeto colocado manualmente', 'success');
                document.getElementById('placeObject').style.display = 'none';
                
                // Animación
                currentObject.scale.set(0, 0, 0);
                let scale = 0;
                function animateScale() {
                    scale += 0.05;
                    if (scale < 1) {
                        currentObject.scale.set(scale, scale, scale);
                        requestAnimationFrame(animateScale);
                    }
                }
                animateScale();
            } else if (!window.lastHitPose) {
                addLog('No hay superficie detectada. Mueve la cámara primero.', 'warning');
            }
        });
        document.getElementById('resetAR').addEventListener('click', resetScene);
        
        // Manejar resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
        
        // === INICIAR ===
        initThree();
        
        addLog('Aplicación lista. Presiona "Iniciar AR" para comenzar.', 'success');
        updateStatus('Listo para iniciar AR');
        
        // Verificación de ARCore
        setTimeout(() => {
            addLog('Consejo: Si no detecta superficies, asegúrate de tener ARCore instalado desde Play Store', 'info');
        }, 2000);
    </script>
</body>
</html>
