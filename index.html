<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>WebXR World Tracking - AR Real</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        #info {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 12px 20px;
            border-radius: 10px;
            z-index: 100;
            backdrop-filter: blur(10px);
            pointer-events: none;
            font-size: 14px;
        }
        #controls {
            position: absolute;
            bottom: 20px;
            left: 20px;
            right: 20px;
            display: flex;
            gap: 10px;
            z-index: 100;
            justify-content: center;
        }
        button {
            padding: 12px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 30px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            transition: transform 0.2s;
        }
        button:hover {
            transform: scale(1.05);
        }
        .recording-indicator {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255,0,0,0.8);
            padding: 8px 15px;
            border-radius: 20px;
            color: white;
            display: none;
            align-items: center;
            gap: 8px;
            z-index: 100;
        }
        .recording-dot {
            width: 10px;
            height: 10px;
            background: white;
            border-radius: 50%;
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        #status {
            position: absolute;
            bottom: 100px;
            left: 20px;
            right: 20px;
            background: rgba(0,0,0,0.8);
            color: #FFD700;
            padding: 10px;
            border-radius: 10px;
            text-align: center;
            font-size: 12px;
            z-index: 100;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="info">
        <strong>🔍 WebXR World Tracking</strong><br>
        Mueve la cámara para detectar superficies
    </div>
    <div id="controls">
        <button id="enterAR">🎯 Iniciar AR</button>
        <button id="recordBtn" style="display:none;">🔴 Grabar</button>
        <button id="stopRecordBtn" style="display:none;">⏹️ Detener</button>
    </div>
    <div id="status">📱 Presiona "Iniciar AR" para comenzar</div>
    <div class="recording-indicator" id="recordingIndicator">
        <div class="recording-dot"></div>
        <span>Grabando AR...</span>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // Variables principales
        let scene, camera, renderer;
        let reticle = null;
        let currentModel = null;
        let xrSession = null;
        let hitTestSource = null;
        let referenceSpace = null;
        let viewerSpace = null;
        
        // Elementos UI
        const enterARBtn = document.getElementById('enterAR');
        const statusDiv = document.getElementById('status');
        
        // Configuración de Three.js
        function initThree() {
            scene = new THREE.Scene();
            
            // Luces para el modelo 3D
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambientLight);
            
            const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
            directionalLight.position.set(5, 10, 7);
            scene.add(directionalLight);
            
            const backLight = new THREE.PointLight(0xffffff, 0.4);
            backLight.position.set(0, 2, -3);
            scene.add(backLight);
            
            // Cámara para renderizado normal (no XR)
            camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 1000);
            
            renderer = new THREE.WebGLRenderer({ antialias: true, preserveDrawingBuffer: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);
            
            // Crear un retículo para mostrar dónde se va a colocar el objeto
            createReticle();
            
            // Crear modelo de demostración (un cubo colorido)
            createDemoModel();
        }
        
        // Crear retículo visual para hit testing
        function createReticle() {
            const geometry = new THREE.RingGeometry(0.15, 0.2, 16);
            const material = new THREE.MeshStandardMaterial({
                color: 0x00ff00,
                emissive: 0x00aa00,
                side: THREE.DoubleSide,
                transparent: true,
                opacity: 0.8
            });
            reticle = new THREE.Mesh(geometry, material);
            reticle.rotation.x = -Math.PI / 2;
            reticle.visible = false;
            scene.add(reticle);
        }
        
        // Crear modelo de demostración (un cubo con materiales bonitos)
        function createDemoModel() {
            const geometry = new THREE.BoxGeometry(0.2, 0.2, 0.2);
            const materials = [
                new THREE.MeshStandardMaterial({ color: 0xff3333 }), // derecha
                new THREE.MeshStandardMaterial({ color: 0x33ff33 }), // izquierda
                new THREE.MeshStandardMaterial({ color: 0x3333ff }), // arriba
                new THREE.MeshStandardMaterial({ color: 0xffff33 }), // abajo
                new THREE.MeshStandardMaterial({ color: 0xff33ff }), // frente
                new THREE.MeshStandardMaterial({ color: 0x33ffff })  // atrás
            ];
            currentModel = new THREE.Mesh(geometry, materials);
            currentModel.castShadow = true;
            currentModel.receiveShadow = true;
            currentModel.visible = false;
            scene.add(currentModel);
            
            // Añadir una esfera alrededor para que se vea más interesante
            const sphereGeo = new THREE.SphereGeometry(0.15, 16, 16);
            const sphereMat = new THREE.MeshStandardMaterial({ color: 0x44aaff, transparent: true, opacity: 0.3 });
            const glowSphere = new THREE.Mesh(sphereGeo, sphereMat);
            currentModel.add(glowSphere);
        }
        
        // Función principal para iniciar AR con WebXR
        async function startAR() {
            if (!navigator.xr) {
                statusDiv.innerHTML = '❌ WebXR no es compatible con este navegador. Usa Chrome en Android o Meta Quest.';
                return;
            }
            
            statusDiv.innerHTML = '🔍 Solicitando permisos de cámara...';
            
            try {
                // Solicitar sesión AR con hit-test feature [citation:3]
                xrSession = await navigator.xr.requestSession('immersive-ar', {
                    requiredFeatures: ['hit-test'],
                    optionalFeatures: ['local-floor', 'dom-overlay']
                });
                
                // Conectar Three.js a la sesión XR
                await renderer.xr.enable();
                renderer.xr.setSession(xrSession);
                
                // Configurar referencia espacial [citation:3]
                referenceSpace = await xrSession.requestReferenceSpace('local');
                viewerSpace = await xrSession.requestReferenceSpace('viewer');
                
                // Crear fuente de hit testing desde el viewer (cámara) [citation:3]
                hitTestSource = await xrSession.requestHitTestSource({ space: viewerSpace });
                
                // Configurar eventos de la sesión
                setupSessionEvents();
                
                // Iniciar renderizado XR
                renderer.setAnimationLoop(renderXRFrame);
                
                // Cambiar UI
                enterARBtn.style.display = 'none';
                document.getElementById('recordBtn').style.display = 'block';
                statusDiv.innerHTML = '✅ AR activo! Mueve la cámara para detectar superficies. Toca para colocar el objeto.';
                
                // Configurar evento de toque para colocar objetos [citation:3]
                setupTapEvents();
                
            } catch (error) {
                console.error('Error al iniciar AR:', error);
                statusDiv.innerHTML = `❌ Error: ${error.message}. Asegúrate de usar Chrome en Android.`;
            }
        }
        
        // Configurar eventos de la sesión XR
        function setupSessionEvents() {
            xrSession.addEventListener('end', () => {
                renderer.setAnimationLoop(null);
                enterARBtn.style.display = 'block';
                document.getElementById('recordBtn').style.display = 'none';
                statusDiv.innerHTML = '📱 Sesión AR finalizada. Presiona "Iniciar AR" para volver.';
                currentModel.visible = false;
                reticle.visible = false;
            });
        }
        
        // Configurar evento de toque para colocar objetos [citation:3]
        function setupTapEvents() {
            xrSession.addEventListener('select', (event) => {
                if (reticle.visible && currentModel) {
                    // Clonar o mover el modelo a la posición del retículo
                    currentModel.position.copy(reticle.position);
                    currentModel.visible = true;
                    statusDiv.innerHTML = '✅ Objeto colocado! Camina alrededor para verlo desde diferentes ángulos.';
                    
                    // Pequeña animación de escala al colocar
                    currentModel.scale.set(0, 0, 0);
                    setTimeout(() => {
                        let scale = 0;
                        const animateScale = () => {
                            scale += 0.05;
                            if (scale < 1) {
                                currentModel.scale.set(scale, scale, scale);
                                requestAnimationFrame(animateScale);
                            } else {
                                currentModel.scale.set(1, 1, 1);
                            }
                        };
                        animateScale();
                    }, 50);
                }
            });
        }
        
        // Frame de renderizado XR - Aquí ocurre el HIT TESTING real [citation:3]
        function renderXRFrame(time, frame) {
            if (!frame || !hitTestSource) return;
            
            // Obtener resultados del hit test [citation:1][citation:3]
            const hitTestResults = frame.getHitTestResults(hitTestSource);
            
            if (hitTestResults.length > 0 && referenceSpace) {
                // Tomar el primer resultado de hit test (la superficie más cercana)
                const hit = hitTestResults[0];
                const hitPose = hit.getPose(referenceSpace);
                
                if (hitPose) {
                    // Posicionar el retículo en el punto de impacto
                    reticle.visible = true;
                    reticle.position.set(
                        hitPose.transform.position.x,
                        hitPose.transform.position.y + 0.01, // Ligeramente elevado para que se vea
                        hitPose.transform.position.z
                    );
                    
                    // Rotar el retículo para que mire hacia la cámara
                    reticle.lookAt(camera.position);
                    
                    // Actualizar estado
                    statusDiv.innerHTML = '🎯 Superficie detectada! Toca para colocar el objeto.';
                }
            } else {
                // No hay superficie detectada
                reticle.visible = false;
                statusDiv.innerHTML = '🔍 Mueve la cámara lentamente para detectar una superficie (piso o mesa)...';
            }
            
            // Mantener el modelo visible si ya fue colocado (no lo movemos)
            if (currentModel.visible && currentModel.position) {
                // El modelo permanece fijo en el mundo real gracias a WebXR
                // No necesitamos actualizar su posición
            }
        }
        
        // Función para grabar (simplificada)
        let mediaRecorder = null;
        let recordedChunks = [];
        let isRecording = false;
        
        async function startRecording() {
            if (!renderer) return;
            
            try {
                const stream = renderer.domElement.captureStream(30);
                mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm' });
                recordedChunks = [];
                
                mediaRecorder.ondataavailable = (event) => {
                    if (event.data.size > 0) recordedChunks.push(event.data);
                };
                
                mediaRecorder.onstop = () => {
                    const blob = new Blob(recordedChunks, { type: 'video/webm' });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `ar-recording-${Date.now()}.webm`;
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    URL.revokeObjectURL(url);
                    statusDiv.innerHTML = '✅ Video guardado!';
                };
                
                mediaRecorder.start(1000);
                isRecording = true;
                document.getElementById('recordBtn').style.display = 'none';
                document.getElementById('stopRecordBtn').style.display = 'block';
                document.getElementById('recordingIndicator').style.display = 'flex';
                statusDiv.innerHTML = '🔴 Grabando...';
            } catch (error) {
                console.error('Error al grabar:', error);
            }
        }
        
        function stopRecording() {
            if (mediaRecorder && isRecording) {
                mediaRecorder.stop();
                isRecording = false;
                document.getElementById('recordBtn').style.display = 'block';
                document.getElementById('stopRecordBtn').style.display = 'none';
                document.getElementById('recordingIndicator').style.display = 'none';
            }
        }
        
        // Event listeners
        enterARBtn.addEventListener('click', startAR);
        document.getElementById('recordBtn').addEventListener('click', startRecording);
        document.getElementById('stopRecordBtn').addEventListener('click', stopRecording);
        
        // Inicializar
        initThree();
        
        // Animación normal (cuando no está en AR)
        function animate() {
            if (!renderer.xr.isPresenting) {
                // Rotación suave para vista previa
                if (currentModel && currentModel.visible === false) {
                    // Solo para vista previa
                }
                renderer.render(scene, camera);
            }
            requestAnimationFrame(animate);
        }
        animate();
        
        // Manejar resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
        
        console.log('Aplicación iniciada. WebXR disponible:', !!navigator.xr);
    </script>
</body>
</html>
