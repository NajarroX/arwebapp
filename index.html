<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>WebXR World Tracking - CORREGIDO para Android</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        #info {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(10px);
            color: white;
            padding: 15px;
            border-radius: 15px;
            z-index: 100;
            font-size: 14px;
            text-align: center;
            pointer-events: none;
        }
        #controls {
            position: absolute;
            bottom: 30px;
            left: 20px;
            right: 20px;
            display: flex;
            gap: 15px;
            z-index: 100;
            justify-content: center;
        }
        button {
            padding: 14px 28px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 40px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
            transition: all 0.3s ease;
            flex: 1;
            max-width: 200px;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(0,0,0,0.5);
        }
        button:active {
            transform: translateY(1px);
        }
        .recording-indicator {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255,0,0,0.9);
            padding: 8px 15px;
            border-radius: 20px;
            color: white;
            display: none;
            align-items: center;
            gap: 8px;
            z-index: 100;
            font-weight: bold;
        }
        .recording-dot {
            width: 12px;
            height: 12px;
            background: white;
            border-radius: 50%;
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.2); }
        }
        #status {
            position: absolute;
            bottom: 120px;
            left: 20px;
            right: 20px;
            background: rgba(0,0,0,0.8);
            color: #FFD700;
            padding: 12px;
            border-radius: 12px;
            text-align: center;
            font-size: 13px;
            z-index: 100;
            pointer-events: none;
            font-weight: 500;
        }
        .instruction {
            position: absolute;
            bottom: 200px;
            left: 20px;
            right: 20px;
            background: rgba(0,0,0,0.7);
            color: #4CAF50;
            padding: 10px;
            border-radius: 10px;
            text-align: center;
            font-size: 12px;
            z-index: 100;
            animation: fadeInOut 3s infinite;
        }
        @keyframes fadeInOut {
            0%, 100% { opacity: 0.7; }
            50% { opacity: 1; }
        }
        @media (max-width: 768px) {
            button { font-size: 14px; padding: 12px 20px; }
            #info { font-size: 12px; top: 10px; }
            #status { font-size: 11px; bottom: 100px; }
        }
    </style>
</head>
<body>
    <div id="info">
        <strong>🚀 WebXR World Tracking - Realidad Aumentada</strong><br>
        Mueve la cámara para detectar superficies (pisos, mesas)
    </div>
    <div id="controls">
        <button id="enterARBtn">🎯 Iniciar AR</button>
        <button id="recordBtn" style="display:none;">🔴 Grabar</button>
        <button id="stopRecordBtn" style="display:none;">⏹️ Detener</button>
    </div>
    <div id="status">📱 Presiona "Iniciar AR" para comenzar</div>
    <div class="instruction" id="instruction">
        💡 Asegúrate de tener Chrome actualizado (versión 81+)
    </div>
    <div class="recording-indicator" id="recordingIndicator">
        <div class="recording-dot"></div>
        <span>Grabando AR...</span>
    </div>

    <!-- IMPORTANTE: Usar la versión correcta de Three.js con soporte WebXR -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        
        // Variables principales
        let scene, camera, renderer;
        let reticle = null;
        let currentModel = null;
        let xrSession = null;
        let hitTestSource = null;
        let referenceSpace = null;
        let modelPlaced = false;
        
        // Elementos UI
        const enterARBtn = document.getElementById('enterARBtn');
        const statusDiv = document.getElementById('status');
        const instructionDiv = document.getElementById('instruction');
        
        // Inicializar Three.js con soporte WebXR
        async function initThree() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x111122);
            
            // Luces para el modelo 3D
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambientLight);
            
            const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
            directionalLight.position.set(5, 10, 7);
            directionalLight.castShadow = true;
            scene.add(directionalLight);
            
            const backLight = new THREE.PointLight(0xffffff, 0.4);
            backLight.position.set(0, 2, -3);
            scene.add(backLight);
            
            // Luz desde abajo para mejor iluminación
            const fillLight = new THREE.PointLight(0x4466cc, 0.3);
            fillLight.position.set(0, -1, 0);
            scene.add(fillLight);
            
            // Cámara normal (para cuando no está en AR)
            camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 1.6, 3);
            
            // Renderer CON soporte WebXR
            renderer = new THREE.WebGLRenderer({ 
                antialias: true, 
                preserveDrawingBuffer: true 
            });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.shadowMap.enabled = true;
            
            // 🔑 IMPORTANTE: Habilitar XR en el renderer - Esta es la sintaxis CORRECTA
            if (renderer.xr) {
                console.log('✅ WebXR soportado por el renderer');
            } else {
                console.warn('⚠️ WebXR no está disponible en este renderer');
            }
            
            document.body.appendChild(renderer.domElement);
            
            // Crear retículo visual para hit testing
            createReticle();
            
            // Crear modelo de demostración (un cubo colorido con animación)
            createDemoModel();
            
            // Animación de vista previa cuando no está en AR
            function animate() {
                if (!xrSession) {
                    // Rotar la cámara alrededor del modelo en preview
                    if (currentModel && !currentModel.visible) {
                        const time = Date.now() * 0.002;
                        camera.position.x = Math.sin(time) * 3;
                        camera.position.z = Math.cos(time) * 3;
                        camera.lookAt(0, 0, 0);
                    }
                    renderer.render(scene, camera);
                }
                requestAnimationFrame(animate);
            }
            animate();
        }
        
        // Crear retículo visual
        function createReticle() {
            // Anillo exterior
            const ringGeo = new THREE.TorusGeometry(0.12, 0.02, 32, 64);
            const ringMat = new THREE.MeshStandardMaterial({ color: 0x00ff00, emissive: 0x00aa44 });
            const ring = new THREE.Mesh(ringGeo, ringMat);
            ring.rotation.x = Math.PI / 2;
            
            // Anillo interior
            const innerRingGeo = new THREE.TorusGeometry(0.08, 0.015, 32, 64);
            const innerRingMat = new THREE.MeshStandardMaterial({ color: 0x00ff88, emissive: 0x00aa44 });
            const innerRing = new THREE.Mesh(innerRingGeo, innerRingMat);
            innerRing.rotation.x = Math.PI / 2;
            
            reticle = new THREE.Group();
            reticle.add(ring);
            reticle.add(innerRing);
            reticle.visible = false;
            scene.add(reticle);
            
            // Partículas alrededor del retículo
            const particleCount = 8;
            for (let i = 0; i < particleCount; i++) {
                const particleGeo = new THREE.SphereGeometry(0.008, 8, 8);
                const particleMat = new THREE.MeshStandardMaterial({ color: 0x00ff66, emissive: 0x00aa44 });
                const particle = new THREE.Mesh(particleGeo, particleMat);
                const angle = (i / particleCount) * Math.PI * 2;
                particle.position.set(Math.cos(angle) * 0.18, 0, Math.sin(angle) * 0.18);
                reticle.add(particle);
            }
        }
        
        // Crear modelo de demostración
        function createDemoModel() {
            const group = new THREE.Group();
            
            // Cubo central con efecto iridiscente
            const geometry = new THREE.BoxGeometry(0.18, 0.18, 0.18);
            const materials = [
                new THREE.MeshStandardMaterial({ color: 0xff3333, metalness: 0.7, roughness: 0.3 }),
                new THREE.MeshStandardMaterial({ color: 0x33ff33, metalness: 0.7, roughness: 0.3 }),
                new THREE.MeshStandardMaterial({ color: 0x3333ff, metalness: 0.7, roughness: 0.3 }),
                new THREE.MeshStandardMaterial({ color: 0xffff33, metalness: 0.7, roughness: 0.3 }),
                new THREE.MeshStandardMaterial({ color: 0xff33ff, metalness: 0.7, roughness: 0.3 }),
                new THREE.MeshStandardMaterial({ color: 0x33ffff, metalness: 0.7, roughness: 0.3 })
            ];
            const cube = new THREE.Mesh(geometry, materials);
            cube.castShadow = true;
            cube.receiveShadow = true;
            group.add(cube);
            
            // Esfera de brillo alrededor
            const sphereGeo = new THREE.SphereGeometry(0.22, 32, 32);
            const sphereMat = new THREE.MeshStandardMaterial({ 
                color: 0x44aaff, 
                transparent: true, 
                opacity: 0.2,
                emissive: 0x2266aa,
                emissiveIntensity: 0.3
            });
            const glowSphere = new THREE.Mesh(sphereGeo, sphereMat);
            group.add(glowSphere);
            
            // Partículas flotantes alrededor
            const particleSystem = new THREE.Group();
            for (let i = 0; i < 12; i++) {
                const particleGeo = new THREE.SphereGeometry(0.01, 6, 6);
                const particleMat = new THREE.MeshStandardMaterial({ color: 0xffaa44, emissive: 0xff4400 });
                const particle = new THREE.Mesh(particleGeo, particleMat);
                particle.userData = {
                    angle: (i / 12) * Math.PI * 2,
                    radius: 0.3,
                    speed: 0.5 + Math.random() * 0.5
                };
                particleSystem.add(particle);
            }
            group.add(particleSystem);
            group.userData.particleSystem = particleSystem;
            
            currentModel = group;
            currentModel.castShadow = true;
            currentModel.receiveShadow = true;
            currentModel.visible = false;
            scene.add(currentModel);
            
            // Animación de partículas
            function animateParticles() {
                if (currentModel && currentModel.userData.particleSystem && currentModel.visible) {
                    const time = Date.now() * 0.003;
                    currentModel.userData.particleSystem.children.forEach((particle, idx) => {
                        const angle = particle.userData.angle + time * particle.userData.speed;
                        particle.position.x = Math.cos(angle) * particle.userData.radius;
                        particle.position.z = Math.sin(angle) * particle.userData.radius;
                        particle.position.y = Math.sin(angle * 2) * 0.1;
                    });
                }
                requestAnimationFrame(animateParticles);
            }
            animateParticles();
        }
        
        // Función principal para iniciar AR con WebXR
        async function startAR() {
            // Verificar soporte WebXR
            if (!navigator.xr) {
                statusDiv.innerHTML = '❌ WebXR no es compatible. Asegúrate de tener Chrome 81+ en Android.';
                instructionDiv.innerHTML = '⚠️ Actualiza Chrome desde Play Store e intenta de nuevo';
                return;
            }
            
            // Verificar si 'immersive-ar' está soportado
            const isSupported = await navigator.xr.isSessionSupported('immersive-ar');
            if (!isSupported) {
                statusDiv.innerHTML = '❌ Tu dispositivo no soporta AR inmersivo. ¿Tienes ARCore instalado?';
                instructionDiv.innerHTML = '💡 Algunos dispositivos Android necesitan ARCore. Búscalo en Play Store.';
                return;
            }
            
            statusDiv.innerHTML = '🔍 Solicitando permisos y cámara...';
            
            try {
                // Solicitar sesión AR con hit-test
                xrSession = await navigator.xr.requestSession('immersive-ar', {
                    requiredFeatures: ['hit-test'],
                    optionalFeatures: ['local-floor', 'dom-overlay']
                });
                
                // Configurar el renderer para XR
                await renderer.xr.setSession(xrSession);
                
                // Obtener espacios de referencia
                referenceSpace = await xrSession.requestReferenceSpace('local');
                const viewerSpace = await xrSession.requestReferenceSpace('viewer');
                
                // Crear fuente de hit testing
                hitTestSource = await xrSession.requestHitTestSource({ space: viewerSpace });
                
                // Configurar eventos de la sesión
                xrSession.addEventListener('end', onSessionEnd);
                
                // Configurar evento de selección (toque) para colocar objetos
                xrSession.addEventListener('select', onSelect);
                
                // Iniciar el loop de renderizado XR
                renderer.setAnimationLoop(renderXRFrame);
                
                // Actualizar UI
                enterARBtn.style.display = 'none';
                document.getElementById('recordBtn').style.display = 'block';
                statusDiv.innerHTML = '✅ AR activo! Mueve la cámara para detectar superficies.';
                instructionDiv.innerHTML = '🎯 Toca la pantalla cuando veas el retículo verde para colocar el objeto.';
                
            } catch (error) {
                console.error('Error al iniciar AR:', error);
                statusDiv.innerHTML = `❌ Error: ${error.message}. Asegúrate de tener Chrome actualizado.`;
                instructionDiv.innerHTML = '💡 Consejo: Reinicia Chrome y asegura que la cámara tenga permisos.';
            }
        }
        
        // Evento cuando termina la sesión
        function onSessionEnd(event) {
            renderer.setAnimationLoop(null);
            xrSession = null;
            hitTestSource = null;
            enterARBtn.style.display = 'block';
            document.getElementById('recordBtn').style.display = 'none';
            statusDiv.innerHTML = '📱 Sesión AR finalizada. Presiona "Iniciar AR" para volver.';
            instructionDiv.innerHTML = '💡 Presiona "Iniciar AR" para comenzar de nuevo.';
            if (currentModel) {
                currentModel.visible = false;
            }
            modelPlaced = false;
        }
        
        // Evento de selección (tocar pantalla)
        function onSelect(event) {
            if (reticle.visible && currentModel && !modelPlaced) {
                // Posicionar el modelo en la posición del retículo
                currentModel.position.copy(reticle.position);
                currentModel.visible = true;
                modelPlaced = true;
                statusDiv.innerHTML = '✅ Objeto colocado! Camina alrededor para verlo desde diferentes ángulos.';
                instructionDiv.innerHTML = '🎉 Excelente! El objeto permanecerá fijo en esa posición.';
                
                // Animación de aparición
                currentModel.scale.set(0, 0, 0);
                let scale = 0;
                function animateScale() {
                    scale += 0.05;
                    if (scale < 1) {
                        currentModel.scale.set(scale, scale, scale);
                        requestAnimationFrame(animateScale);
                    } else {
                        currentModel.scale.set(1, 1, 1);
                    }
                }
                animateScale();
            }
        }
        
        // Frame de renderizado XR - Aquí ocurre el HIT TESTING real
        function renderXRFrame(time, frame) {
            if (!frame || !hitTestSource || !referenceSpace) return;
            
            // Obtener resultados del hit test
            const hitTestResults = frame.getHitTestResults(hitTestSource);
            
            if (hitTestResults.length > 0) {
                // Hay superficie detectada
                const hit = hitTestResults[0];
                const hitPose = hit.getPose(referenceSpace);
                
                if (hitPose) {
                    // Posicionar el retículo en el punto de impacto
                    reticle.visible = true;
                    reticle.position.set(
                        hitPose.transform.position.x,
                        hitPose.transform.position.y + 0.05,
                        hitPose.transform.position.z
                    );
                    
                    // Hacer que el retículo mire hacia la cámara
                    if (xrSession) {
                        const cameraPose = frame.getViewerPose(referenceSpace);
                        if (cameraPose) {
                            reticle.lookAt(cameraPose.transform.position);
                        }
                    }
                    
                    // Animación de pulsación del retículo
                    const scale = 1 + Math.sin(Date.now() * 0.015) * 0.2;
                    reticle.scale.set(scale, scale, scale);
                    
                    if (!modelPlaced) {
                        statusDiv.innerHTML = '🎯 Superficie detectada! Toca la pantalla para colocar el objeto.';
                    }
                }
            } else {
                reticle.visible = false;
                if (!modelPlaced) {
                    statusDiv.innerHTML = '🔍 Mueve la cámara lentamente para detectar una superficie (piso o mesa)...';
                }
            }
        }
        
        // Función de grabación (opcional)
        let mediaRecorder = null;
        let recordedChunks = [];
        let isRecording = false;
        
        async function startRecording() {
            if (!renderer) return;
            
            try {
                const stream = renderer.domElement.captureStream(30);
                mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm' });
                recordedChunks = [];
                
                mediaRecorder.ondataavailable = (event) => {
                    if (event.data.size > 0) recordedChunks.push(event.data);
                };
                
                mediaRecorder.onstop = () => {
                    const blob = new Blob(recordedChunks, { type: 'video/webm' });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `ar-world-tracking-${Date.now()}.webm`;
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    URL.revokeObjectURL(url);
                    statusDiv.innerHTML = '✅ Video guardado en descargas!';
                };
                
                mediaRecorder.start(1000);
                isRecording = true;
                document.getElementById('recordBtn').style.display = 'none';
                document.getElementById('stopRecordBtn').style.display = 'block';
                document.getElementById('recordingIndicator').style.display = 'flex';
                statusDiv.innerHTML = '🔴 Grabando experiencia AR...';
            } catch (error) {
                console.error('Error al grabar:', error);
            }
        }
        
        function stopRecording() {
            if (mediaRecorder && isRecording) {
                mediaRecorder.stop();
                isRecording = false;
                document.getElementById('recordBtn').style.display = 'block';
                document.getElementById('stopRecordBtn').style.display = 'none';
                document.getElementById('recordingIndicator').style.display = 'none';
            }
        }
        
        // Event listeners
        enterARBtn.addEventListener('click', startAR);
        document.getElementById('recordBtn').addEventListener('click', startRecording);
        document.getElementById('stopRecordBtn').addEventListener('click', stopRecording);
        
        // Inicializar la escena
        initThree();
        
        // Manejar resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
        
        // Verificar compatibilidad al cargar
        console.log('🔍 Verificando compatibilidad WebXR...');
        console.log('navigator.xr disponible:', !!navigator.xr);
        if (navigator.xr) {
            navigator.xr.isSessionSupported('immersive-ar').then(supported => {
                console.log('immersive-ar soportado:', supported);
                if (supported) {
                    statusDiv.innerHTML = '✅ WebXR disponible! Presiona "Iniciar AR" para comenzar.';
                    instructionDiv.innerHTML = '🎯 Presiona el botón verde para iniciar la experiencia AR';
                } else {
                    statusDiv.innerHTML = '⚠️ AR inmersivo no soportado. ¿Tienes ARCore instalado?';
                }
            });
        } else {
            statusDiv.innerHTML = '⚠️ WebXR no disponible. Actualiza Chrome (versión 81+) desde Play Store.';
        }
    </script>
</body>
</html>
