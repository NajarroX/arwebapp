<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AR Real con Three.js - Modelos 3D y Grabación</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            position: fixed;
            width: 100%;
            height: 100%;
        }
        
        #info {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 12px 20px;
            border-radius: 10px;
            z-index: 100;
            backdrop-filter: blur(10px);
            pointer-events: none;
            font-size: 14px;
        }
        
        #controls {
            position: absolute;
            bottom: 20px;
            left: 20px;
            right: 20px;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(20px);
            border-radius: 15px;
            padding: 15px;
            z-index: 100;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            pointer-events: auto;
        }
        
        button {
            padding: 12px 20px;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            background: linear-gradient(45deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        
        button.danger {
            background: linear-gradient(45deg, #f093fb 0%, #f5576c 100%);
        }
        
        button.success {
            background: linear-gradient(45deg, #4facfe 0%, #00f2fe 100%);
        }
        
        select {
            padding: 10px 15px;
            border-radius: 10px;
            border: none;
            background: rgba(255,255,255,0.2);
            color: white;
            font-size: 14px;
            cursor: pointer;
        }
        
        select option {
            background: #333;
        }
        
        .recording-indicator {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255,0,0,0.8);
            padding: 8px 15px;
            border-radius: 20px;
            color: white;
            display: none;
            align-items: center;
            gap: 8px;
            z-index: 100;
            font-size: 12px;
        }
        
        .recording-dot {
            width: 10px;
            height: 10px;
            background: white;
            border-radius: 50%;
            animation: pulse 1s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        
        @media (max-width: 768px) {
            button {
                padding: 10px 15px;
                font-size: 12px;
            }
            
            select {
                font-size: 12px;
            }
            
            #info {
                font-size: 10px;
                top: 10px;
                left: 10px;
            }
        }
    </style>
</head>
<body>
    <div id="info">
        <div id="statusText">🔍 Inicializando cámara...</div>
        <div id="modelStatus">📦 Modelo: Ninguno</div>
    </div>
    
    <div id="controls">
        <select id="modelSelect">
            <option value="robot">🤖 Robot (GLB)</option>
            <option value="horse">🐴 Caballo (GLB)</option>
            <option value="cube">📦 Cubo (Demo)</option>
        </select>
        <button id="loadModelBtn" class="success">Cargar Modelo</button>
        <button id="recordBtn">🔴 Grabar</button>
        <button id="stopRecordBtn" class="danger" style="display:none;">⏹️ Detener</button>
        <button id="resetBtn">🔄 Resetear</button>
    </div>
    
    <div class="recording-indicator" id="recordingIndicator">
        <div class="recording-dot"></div>
        <span>Grabando...</span>
    </div>

    <!-- Bibliotecas -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // Variables principales
        let scene, camera, renderer;
        let currentModel = null;
        let videoTexture = null;
        let videoElement = null;
        let mediaRecorder = null;
        let recordedChunks = [];
        let isRecording = false;
        let animationId = null;
        
        // Configuración
        const statusDiv = document.getElementById('statusText');
        const modelStatusDiv = document.getElementById('modelStatus');
        
        // URLs de modelos 3D reales
        const models = {
            robot: 'https://threejs.org/examples/models/gltf/RobotExpressive/RobotExpressive.glb',
            horse: 'https://threejs.org/examples/models/gltf/Horse.glb',
            cube: null // Modelo de cubo de demostración
        };
        
        // Inicializar la escena con cámara real
        async function init() {
            try {
                // Crear escena
                scene = new THREE.Scene();
                
                // Crear cámara para AR
                const aspect = window.innerWidth / window.innerHeight;
                camera = new THREE.PerspectiveCamera(70, aspect, 0.01, 1000);
                camera.position.set(0, 0, 0);
                
                // Crear renderizador
                renderer = new THREE.WebGLRenderer({ 
                    antialias: true,
                    preserveDrawingBuffer: true // Para grabación
                });
                renderer.setSize(window.innerWidth, window.innerHeight);
                renderer.setPixelRatio(window.devicePixelRatio);
                document.body.appendChild(renderer.domElement);
                
                // Inicializar cámara real
                await initRealCamera();
                
                // Configurar luces
                setupLights();
                
                // Configurar plano de suelo para detección de superficies
                setupGroundPlane();
                
                // Configurar gestos táctiles para posicionar modelos
                setupTouchControls();
                
                // Iniciar animación
                animate();
                
                statusDiv.innerHTML = '✅ Cámara lista - Toca la pantalla para colocar modelos';
                
                // Cargar modelo por defecto
                setTimeout(() => {
                    loadModel('cube');
                }, 1000);
                
            } catch (error) {
                console.error('Error al inicializar:', error);
                statusDiv.innerHTML = '❌ Error: ' + error.message;
            }
        }
        
        // Inicializar cámara real del dispositivo
        async function initRealCamera() {
            return new Promise(async (resolve, reject) => {
                try {
                    // Solicitar acceso a la cámara
                    const stream = await navigator.mediaDevices.getUserMedia({
                        video: {
                            facingMode: 'environment', // Cámara trasera
                            width: { ideal: 1920 },
                            height: { ideal: 1080 }
                        }
                    });
                    
                    // Crear elemento de video
                    videoElement = document.createElement('video');
                    videoElement.srcObject = stream;
                    videoElement.play();
                    
                    // Esperar a que el video esté listo
                    await new Promise((resolve) => {
                        videoElement.onloadedmetadata = () => {
                            resolve();
                        };
                    });
                    
                    // Crear textura de video
                    videoTexture = new THREE.VideoTexture(videoElement);
                    videoTexture.minFilter = THREE.LinearFilter;
                    videoTexture.magFilter = THREE.LinearFilter;
                    
                    // Crear plano para mostrar el video de fondo
                    const videoPlane = new THREE.Mesh(
                        new THREE.PlaneGeometry(2, 2),
                        new THREE.MeshBasicMaterial({ map: videoTexture, depthTest: false, depthWrite: false })
                    );
                    videoPlane.scale.set(window.innerWidth / window.innerHeight, 1, 1);
                    videoPlane.position.set(0, 0, -1);
                    scene.add(videoPlane);
                    
                    // Configurar la cámara para AR
                    camera.matrixAutoUpdate = false;
                    
                    resolve();
                } catch (error) {
                    console.error('Error al acceder a la cámara:', error);
                    reject(new Error('No se pudo acceder a la cámara. Por favor, verifica los permisos.'));
                }
            });
        }
        
        // Configurar luces
        function setupLights() {
            // Luz ambiental
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambientLight);
            
            // Luz direccional
            const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
            directionalLight.position.set(1, 2, 1);
            scene.add(directionalLight);
            
            // Luz de relleno
            const fillLight = new THREE.PointLight(0xffffff, 0.3);
            fillLight.position.set(0, 1, 0);
            scene.add(fillLight);
        }
        
        // Configurar plano de suelo virtual para detección de superficies
        function setupGroundPlane() {
            // Crear un plano invisible para detectar toques
            const groundPlane = new THREE.Mesh(
                new THREE.PlaneGeometry(10, 10),
                new THREE.MeshBasicMaterial({ visible: false, side: THREE.DoubleSide })
            );
            groundPlane.position.set(0, 0, -2);
            groundPlane.rotation.x = -Math.PI / 2;
            scene.add(groundPlane);
            
            // Guardar referencia para detección de toques
            window.groundPlane = groundPlane;
        }
        
        // Configurar controles táctiles para posicionar modelos
        function setupTouchControls() {
            const raycaster = new THREE.Raycaster();
            const mouse = new THREE.Vector2();
            
            renderer.domElement.addEventListener('click', (event) => {
                // Calcular posición del toque
                mouse.x = (event.clientX / renderer.domElement.clientWidth) * 2 - 1;
                mouse.y = -(event.clientY / renderer.domElement.clientHeight) * 2 + 1;
                
                // Raycaster para detectar posición en el mundo
                raycaster.setFromCamera(mouse, camera);
                
                // Crear un punto a 2 metros de distancia
                const direction = raycaster.ray.direction.clone();
                const point = camera.position.clone().add(direction.multiplyScalar(2));
                
                if (currentModel) {
                    // Posicionar modelo en el punto tocado
                    currentModel.position.copy(point);
                    currentModel.visible = true;
                    statusDiv.innerHTML = '✅ Modelo colocado en la superficie';
                    
                    // Pequeña animación de aparición
                    currentModel.scale.set(0, 0, 0);
                    setTimeout(() => {
                        animateAppear(currentModel);
                    }, 50);
                } else {
                    statusDiv.innerHTML = '⚠️ Primero carga un modelo';
                }
            });
        }
        
        // Animación de aparición
        function animateAppear(model) {
            let scale = 0;
            const targetScale = 0.5;
            const animate = () => {
                scale += 0.05;
                if (scale < targetScale) {
                    model.scale.set(scale, scale, scale);
                    requestAnimationFrame(animate);
                } else {
                    model.scale.set(targetScale, targetScale, targetScale);
                }
            };
            animate();
        }
        
        // Cargar modelo 3D
        async function loadModel(modelType) {
            // Eliminar modelo actual
            if (currentModel) {
                scene.remove(currentModel);
                currentModel = null;
            }
            
            const modelUrl = models[modelType];
            
            if (!modelUrl || modelType === 'cube') {
                // Crear modelo de cubo de demostración
                const geometry = new THREE.BoxGeometry(0.5, 0.5, 0.5);
                const material = new THREE.MeshStandardMaterial({ 
                    color: 0x44aa88,
                    metalness: 0.7,
                    roughness: 0.3
                });
                currentModel = new THREE.Mesh(geometry, material);
                currentModel.castShadow = true;
                currentModel.receiveShadow = true;
                currentModel.position.set(0, 0, -2);
                currentModel.scale.set(0.5, 0.5, 0.5);
                scene.add(currentModel);
                modelStatusDiv.innerHTML = '📦 Modelo: Cubo Demo';
                statusDiv.innerHTML = '✅ Cubo cargado - Toca la pantalla para moverlo';
                return;
            }
            
            // Cargar modelo GLB
            statusDiv.innerHTML = '⏳ Cargando modelo 3D...';
            modelStatusDiv.innerHTML = '📦 Modelo: Cargando...';
            
            const loader = new GLTFLoader();
            
            try {
                const gltf = await loader.loadAsync(modelUrl);
                currentModel = gltf.scene;
                currentModel.position.set(0, 0, -2);
                currentModel.scale.set(0.5, 0.5, 0.5);
                currentModel.castShadow = true;
                currentModel.receiveShadow = true;
                
                // Activar animaciones si existen
                if (gltf.animations && gltf.animations.length > 0) {
                    const mixer = new THREE.AnimationMixer(currentModel);
                    gltf.animations.forEach((clip) => {
                        mixer.clipAction(clip).play();
                    });
                    currentModel.userData.mixer = mixer;
                }
                
                scene.add(currentModel);
                modelStatusDiv.innerHTML = `📦 Modelo: ${modelType.charAt(0).toUpperCase() + modelType.slice(1)}`;
                statusDiv.innerHTML = '✅ Modelo cargado - Toca la pantalla para colocarlo';
                
            } catch (error) {
                console.error('Error al cargar modelo:', error);
                statusDiv.innerHTML = '❌ Error al cargar modelo. Usando cubo de demo.';
                loadModel('cube');
            }
        }
        
        // Iniciar grabación
        async function startRecording() {
            if (!renderer) return;
            
            try {
                // Obtener stream del canvas
                const stream = renderer.domElement.captureStream(30);
                
                // Configurar MediaRecorder
                const mimeType = MediaRecorder.isTypeSupported('video/webm') 
                    ? 'video/webm' 
                    : 'video/mp4';
                
                mediaRecorder = new MediaRecorder(stream, {
                    mimeType: mimeType,
                    videoBitsPerSecond: 5000000 // 5 Mbps
                });
                
                recordedChunks = [];
                mediaRecorder.ondataavailable = (event) => {
                    if (event.data.size > 0) {
                        recordedChunks.push(event.data);
                    }
                };
                
                mediaRecorder.onstop = () => {
                    const blob = new Blob(recordedChunks, { type: 'video/webm' });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `ar-video-${Date.now()}.webm`;
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    URL.revokeObjectURL(url);
                    statusDiv.innerHTML = '✅ Video guardado en la galería';
                };
                
                mediaRecorder.start(1000); // Grabar en segmentos de 1 segundo
                isRecording = true;
                
                // Actualizar UI
                document.getElementById('recordBtn').style.display = 'none';
                document.getElementById('stopRecordBtn').style.display = 'block';
                document.getElementById('recordingIndicator').style.display = 'flex';
                statusDiv.innerHTML = '🔴 Grabando...';
                
            } catch (error) {
                console.error('Error al grabar:', error);
                statusDiv.innerHTML = '❌ Error al iniciar grabación';
            }
        }
        
        // Detener grabación
        function stopRecording() {
            if (mediaRecorder && isRecording) {
                mediaRecorder.stop();
                isRecording = false;
                
                // Actualizar UI
                document.getElementById('recordBtn').style.display = 'block';
                document.getElementById('stopRecordBtn').style.display = 'none';
                document.getElementById('recordingIndicator').style.display = 'none';
                statusDiv.innerHTML = '✅ Grabación finalizada';
            }
        }
        
        // Resetear escena
        function resetScene() {
            if (currentModel) {
                currentModel.position.set(0, 0, -2);
                statusDiv.innerHTML = '🔄 Escena reseteada - Toca para mover el modelo';
            }
        }
        
        // Animación principal
        function animate() {
            animationId = requestAnimationFrame(animate);
            
            // Actualizar textura de video si existe
            if (videoTexture) {
                videoTexture.needsUpdate = true;
            }
            
            // Actualizar animaciones del modelo
            if (currentModel && currentModel.userData.mixer) {
                const delta = 1/60;
                currentModel.userData.mixer.update(delta);
            }
            
            // Pequeña rotación para el cubo demo
            if (currentModel && currentModel.isMesh && currentModel.geometry.type === 'BoxGeometry') {
                currentModel.rotation.y += 0.01;
                currentModel.rotation.x += 0.005;
            }
            
            renderer.render(scene, camera);
        }
        
        // Manejar cambios de tamaño de ventana
        window.addEventListener('resize', () => {
            const aspect = window.innerWidth / window.innerHeight;
            camera.aspect = aspect;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
        
        // Configurar eventos de UI
        document.getElementById('loadModelBtn').addEventListener('click', () => {
            const selectedModel = document.getElementById('modelSelect').value;
            loadModel(selectedModel);
        });
        
        document.getElementById('recordBtn').addEventListener('click', startRecording);
        document.getElementById('stopRecordBtn').addEventListener('click', stopRecording);
        document.getElementById('resetBtn').addEventListener('click', resetScene);
        
        // Iniciar aplicación
        init();
    </script>
</body>
</html>
