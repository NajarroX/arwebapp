<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AR.js - Surface Tracking con Modelos 3D</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            position: fixed;
            width: 100%;
            height: 100%;
            background: #000;
        }
        
        #info {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
            color: white;
            padding: 12px 20px;
            border-radius: 15px;
            z-index: 100;
            font-size: 14px;
            text-align: center;
            pointer-events: none;
        }
        
        #controls {
            position: absolute;
            bottom: 20px;
            left: 20px;
            right: 20px;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 15px;
            z-index: 100;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            pointer-events: auto;
        }
        
        button {
            padding: 12px 20px;
            border: none;
            border-radius: 12px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            flex: 1;
            min-width: 100px;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        
        button.danger {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }
        
        button.success {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
        }
        
        select {
            padding: 10px 15px;
            border-radius: 12px;
            border: none;
            background: rgba(255,255,255,0.2);
            color: white;
            font-size: 14px;
            cursor: pointer;
            flex: 1;
        }
        
        select option {
            background: #333;
        }
        
        .recording-indicator {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255,0,0,0.9);
            padding: 8px 15px;
            border-radius: 20px;
            color: white;
            display: none;
            align-items: center;
            gap: 8px;
            z-index: 100;
            font-size: 12px;
            font-weight: bold;
        }
        
        .recording-dot {
            width: 10px;
            height: 10px;
            background: white;
            border-radius: 50%;
            animation: pulse 1s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        
        .surface-message {
            position: absolute;
            bottom: 100px;
            left: 20px;
            right: 20px;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
            padding: 15px;
            border-radius: 15px;
            text-align: center;
            color: #FFD700;
            font-weight: bold;
            z-index: 100;
            pointer-events: none;
            animation: fadeInOut 3s ease-in-out infinite;
        }
        
        @keyframes fadeInOut {
            0%, 100% { opacity: 0.7; }
            50% { opacity: 1; }
        }
        
        @media (max-width: 768px) {
            button, select {
                padding: 10px 12px;
                font-size: 12px;
            }
            
            #info {
                font-size: 11px;
                top: 10px;
                left: 10px;
                right: 10px;
            }
        }
    </style>
</head>
<body>
    <div id="info">
        <div id="statusText">🔍 Mueve la cámara para detectar superficies...</div>
        <div id="modelStatus">📦 Esperando superficie...</div>
    </div>
    
    <div id="controls">
        <select id="modelSelect">
            <option value="robot">🤖 Robot Animado</option>
            <option value="horse">🐴 Caballo</option>
            <option value="cube">📦 Cubo Demo</option>
            <option value="tree">🌳 Árbol</option>
        </select>
        <button id="loadModelBtn" class="success">Cargar Modelo</button>
        <button id="recordBtn">🔴 Grabar</button>
        <button id="stopRecordBtn" class="danger" style="display:none;">⏹️ Detener</button>
        <button id="resetBtn">🔄 Resetear</button>
    </div>
    
    <div class="recording-indicator" id="recordingIndicator">
        <div class="recording-dot"></div>
        <span>Grabando AR...</span>
    </div>
    
    <div class="surface-message" id="surfaceMessage">
        🎯 Apunta a una superficie plana (piso o mesa)
    </div>

    <!-- Importar Three.js y AR.js -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // Variables principales
        let scene, camera, renderer;
        let currentModel = null;
        let surfaceDetected = false;
        let surfacePosition = null;
        let videoTexture = null;
        let videoElement = null;
        let mediaRecorder = null;
        let recordedChunks = [];
        let isRecording = false;
        let animationId = null;
        let hitTestTimeout = null;
        
        // Configuración
        const statusDiv = document.getElementById('statusText');
        const modelStatusDiv = document.getElementById('modelStatus');
        const surfaceMessageDiv = document.getElementById('surfaceMessage');
        
        // URLs de modelos 3D
        const models = {
            robot: 'https://threejs.org/examples/models/gltf/RobotExpressive/RobotExpressive.glb',
            horse: 'https://threejs.org/examples/models/gltf/Horse.glb',
            tree: 'https://threejs.org/examples/models/gltf/Flamingo.glb',
            cube: null
        };
        
        // Inicializar aplicación
        async function init() {
            try {
                // Crear escena
                scene = new THREE.Scene();
                
                // Crear cámara
                const aspect = window.innerWidth / window.innerHeight;
                camera = new THREE.PerspectiveCamera(70, aspect, 0.01, 1000);
                camera.position.set(0, 1.5, 0);
                
                // Crear renderizador
                renderer = new THREE.WebGLRenderer({ 
                    antialias: true,
                    preserveDrawingBuffer: true
                });
                renderer.setSize(window.innerWidth, window.innerHeight);
                renderer.setPixelRatio(window.devicePixelRatio);
                document.body.appendChild(renderer.domElement);
                
                // Inicializar cámara real
                await initRealCamera();
                
                // Configurar luces
                setupLights();
                
                // Configurar sistema de detección de superficies
                setupSurfaceDetection();
                
                // Configurar gestos
                setupGestures();
                
                // Iniciar animación
                animate();
                
                // Ocultar mensaje después de 5 segundos
                setTimeout(() => {
                    surfaceMessageDiv.style.opacity = '0';
                    setTimeout(() => {
                        surfaceMessageDiv.style.display = 'none';
                    }, 1000);
                }, 5000);
                
            } catch (error) {
                console.error('Error:', error);
                statusDiv.innerHTML = '❌ Error: ' + error.message;
            }
        }
        
        // Inicializar cámara real
        async function initRealCamera() {
            return new Promise(async (resolve, reject) => {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({
                        video: {
                            facingMode: 'environment',
                            width: { ideal: 1920 },
                            height: { ideal: 1080 }
                        }
                    });
                    
                    videoElement = document.createElement('video');
                    videoElement.srcObject = stream;
                    videoElement.play();
                    
                    await new Promise((resolve) => {
                        videoElement.onloadedmetadata = () => resolve();
                    });
                    
                    videoTexture = new THREE.VideoTexture(videoElement);
                    videoTexture.minFilter = THREE.LinearFilter;
                    videoTexture.magFilter = THREE.LinearFilter;
                    
                    // Plano de fondo
                    const videoPlane = new THREE.Mesh(
                        new THREE.PlaneGeometry(2, 2),
                        new THREE.MeshBasicMaterial({ map: videoTexture, depthTest: false, depthWrite: false })
                    );
                    videoPlane.scale.set(window.innerWidth / window.innerHeight, 1, 1);
                    videoPlane.position.set(0, 0, -1);
                    scene.add(videoPlane);
                    
                    // Actualizar matriz de la cámara
                    camera.matrixAutoUpdate = false;
                    
                    resolve();
                } catch (error) {
                    reject(error);
                }
            });
        }
        
        // Configurar luces
        function setupLights() {
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
            scene.add(ambientLight);
            
            const directionalLight = new THREE.DirectionalLight(0xffffff, 0.9);
            directionalLight.position.set(1, 2, 1);
            scene.add(directionalLight);
            
            const backLight = new THREE.PointLight(0xffffff, 0.5);
            backLight.position.set(0, 2, -1);
            scene.add(backLight);
            
            // Luz para sombras
            const fillLight = new THREE.PointLight(0xffffff, 0.3);
            fillLight.position.set(0, 1, 0);
            scene.add(fillLight);
        }
        
        // Sistema de detección de superficies mejorado
        function setupSurfaceDetection() {
            // Crear un grid visual para feedback
            const gridHelper = new THREE.GridHelper(3, 20, 0x00ff00, 0x00ff00);
            gridHelper.position.y = -0.5;
            gridHelper.visible = false;
            scene.add(gridHelper);
            
            // Detectar superficies mediante movimiento de cámara
            let lastPosition = null;
            let detectedPoints = [];
            
            // Simular detección de superficie basada en la orientación del dispositivo
            setInterval(() => {
                if (!surfaceDetected && currentModel) {
                    // Simular detección de superficie después de 2 segundos
                    if (!hitTestTimeout) {
                        hitTestTimeout = setTimeout(() => {
                            detectSurface();
                        }, 2000);
                    }
                }
            }, 1000);
        }
        
        // Detectar superficie
        function detectSurface() {
            // Posicionar superficie a 1.5 metros frente a la cámara
            const forward = new THREE.Vector3(0, 0, -1);
            forward.applyQuaternion(camera.quaternion);
            
            surfacePosition = camera.position.clone().add(forward.multiplyScalar(1.5));
            surfacePosition.y = 0; // Asumimos que la superficie está a nivel del suelo
            
            surfaceDetected = true;
            
            if (currentModel) {
                placeModelOnSurface();
            }
            
            statusDiv.innerHTML = '✅ Superficie detectada! Colocando modelo...';
            
            // Mostrar feedback visual
            const surfaceIndicator = new THREE.Mesh(
                new THREE.CircleGeometry(0.3, 16),
                new THREE.MeshStandardMaterial({ color: 0x00ff00, transparent: true, opacity: 0.5 })
            );
            surfaceIndicator.position.copy(surfacePosition);
            surfaceIndicator.rotation.x = -Math.PI / 2;
            scene.add(surfaceIndicator);
            
            setTimeout(() => {
                scene.remove(surfaceIndicator);
            }, 2000);
        }
        
        // Colocar modelo en la superficie detectada
        function placeModelOnSurface() {
            if (currentModel && surfacePosition) {
                currentModel.position.copy(surfacePosition);
                currentModel.position.y = 0; // Asegurar que esté en la superficie
                currentModel.visible = true;
                
                // Animación de aparición
                currentModel.scale.set(0, 0, 0);
                animateAppear(currentModel, 0.5);
                
                statusDiv.innerHTML = '✅ Modelo anclado a la superficie!';
                modelStatusDiv.innerHTML = '📍 Modelo fijo en el suelo';
                
                // Actualizar grid helper
                const gridHelper = scene.children.find(c => c.isGridHelper);
                if (gridHelper) {
                    gridHelper.position.copy(surfacePosition);
                    gridHelper.position.y = -0.1;
                    gridHelper.visible = true;
                    
                    setTimeout(() => {
                        gridHelper.visible = false;
                    }, 3000);
                }
            }
        }
        
        // Animación de aparición
        function animateAppear(model, targetScale) {
            let scale = 0;
            const animate = () => {
                scale += 0.05;
                if (scale < targetScale) {
                    model.scale.set(scale, scale, scale);
                    requestAnimationFrame(animate);
                } else {
                    model.scale.set(targetScale, targetScale, targetScale);
                }
            };
            animate();
        }
        
        // Configurar gestos táctiles
        function setupGestures() {
            let touchStartDistance = 0;
            let initialScale = 1;
            
            renderer.domElement.addEventListener('touchstart', (e) => {
                if (e.touches.length === 2 && currentModel) {
                    // Pinch to zoom
                    const dx = e.touches[0].clientX - e.touches[1].clientX;
                    const dy = e.touches[0].clientY - e.touches[1].clientY;
                    touchStartDistance = Math.sqrt(dx * dx + dy * dy);
                    initialScale = currentModel.scale.x;
                }
            });
            
            renderer.domElement.addEventListener('touchmove', (e) => {
                if (e.touches.length === 2 && currentModel && touchStartDistance > 0) {
                    e.preventDefault();
                    const dx = e.touches[0].clientX - e.touches[1].clientX;
                    const dy = e.touches[0].clientY - e.touches[1].clientY;
                    const distance = Math.sqrt(dx * dx + dy * dy);
                    const scale = initialScale * (distance / touchStartDistance);
                    currentModel.scale.set(scale, scale, scale);
                }
            });
            
            renderer.domElement.addEventListener('touchend', () => {
                touchStartDistance = 0;
            });
            
            // Un toque para reposicionar si no hay superficie detectada
            renderer.domElement.addEventListener('click', () => {
                if (!surfaceDetected) {
                    detectSurface();
                }
            });
        }
        
        // Cargar modelo 3D
        async function loadModel(modelType) {
            // Eliminar modelo actual
            if (currentModel) {
                scene.remove(currentModel);
                currentModel = null;
            }
            
            surfaceDetected = false;
            surfacePosition = null;
            
            const modelUrl = models[modelType];
            
            if (!modelUrl || modelType === 'cube') {
                // Modelo de cubo de demostración
                const geometry = new THREE.BoxGeometry(0.5, 0.5, 0.5);
                const material = new THREE.MeshStandardMaterial({ 
                    color: 0x44aa88,
                    metalness: 0.7,
                    roughness: 0.3,
                    emissive: 0x226644
                });
                currentModel = new THREE.Mesh(geometry, material);
                currentModel.castShadow = true;
                currentModel.receiveShadow = true;
                currentModel.visible = false;
                scene.add(currentModel);
                modelStatusDiv.innerHTML = '📦 Modelo: Cubo Demo';
                statusDiv.innerHTML = '🔍 Mueve la cámara para detectar superficie';
                return;
            }
            
            statusDiv.innerHTML = '⏳ Cargando modelo 3D...';
            modelStatusDiv.innerHTML = '📦 Cargando...';
            
            const loader = new GLTFLoader();
            
            try {
                const gltf = await loader.loadAsync(modelUrl);
                currentModel = gltf.scene;
                currentModel.visible = false;
                currentModel.castShadow = true;
                currentModel.receiveShadow = true;
                
                // Configurar animaciones
                if (gltf.animations && gltf.animations.length > 0) {
                    const mixer = new THREE.AnimationMixer(currentModel);
                    gltf.animations.forEach((clip) => {
                        mixer.clipAction(clip).play();
                    });
                    currentModel.userData.mixer = mixer;
                }
                
                scene.add(currentModel);
                modelStatusDiv.innerHTML = `📦 Modelo: ${modelType.charAt(0).toUpperCase() + modelType.slice(1)}`;
                statusDiv.innerHTML = '🔍 Mueve la cámara lentamente para detectar superficie';
                
                // Iniciar detección de superficie
                detectSurface();
                
            } catch (error) {
                console.error('Error:', error);
                statusDiv.innerHTML = '❌ Error al cargar. Usando cubo demo.';
                loadModel('cube');
            }
        }
        
        // Iniciar grabación
        async function startRecording() {
            try {
                const stream = renderer.domElement.captureStream(30);
                const mimeType = MediaRecorder.isTypeSupported('video/webm') ? 'video/webm' : 'video/mp4';
                
                mediaRecorder = new MediaRecorder(stream, {
                    mimeType: mimeType,
                    videoBitsPerSecond: 5000000
                });
                
                recordedChunks = [];
                mediaRecorder.ondataavailable = (event) => {
                    if (event.data.size > 0) {
                        recordedChunks.push(event.data);
                    }
                };
                
                mediaRecorder.onstop = () => {
                    const blob = new Blob(recordedChunks, { type: 'video/webm' });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `ar-recording-${Date.now()}.webm`;
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    URL.revokeObjectURL(url);
                    statusDiv.innerHTML = '✅ Video guardado!';
                };
                
                mediaRecorder.start(1000);
                isRecording = true;
                
                document.getElementById('recordBtn').style.display = 'none';
                document.getElementById('stopRecordBtn').style.display = 'block';
                document.getElementById('recordingIndicator').style.display = 'flex';
                statusDiv.innerHTML = '🔴 Grabando experiencia AR...';
                
            } catch (error) {
                console.error('Error al grabar:', error);
                statusDiv.innerHTML = '❌ Error al iniciar grabación';
            }
        }
        
        // Detener grabación
        function stopRecording() {
            if (mediaRecorder && isRecording) {
                mediaRecorder.stop();
                isRecording = false;
                
                document.getElementById('recordBtn').style.display = 'block';
                document.getElementById('stopRecordBtn').style.display = 'none';
                document.getElementById('recordingIndicator').style.display = 'none';
                statusDiv.innerHTML = '✅ Grabación finalizada';
            }
        }
        
        // Resetear escena
        function resetScene() {
            if (currentModel) {
                scene.remove(currentModel);
                currentModel = null;
            }
            surfaceDetected = false;
            surfacePosition = null;
            statusDiv.innerHTML = '🔄 Escena reseteada';
            modelStatusDiv.innerHTML = '📦 Esperando superficie...';
            
            if (hitTestTimeout) {
                clearTimeout(hitTestTimeout);
                hitTestTimeout = null;
            }
        }
        
        // Animación principal
        function animate() {
            animationId = requestAnimationFrame(animate);
            
            if (videoTexture) {
                videoTexture.needsUpdate = true;
            }
            
            // Actualizar animaciones del modelo
            if (currentModel && currentModel.userData.mixer) {
                const delta = 1/60;
                currentModel.userData.mixer.update(delta);
            }
            
            // Rotación del cubo demo
            if (currentModel && currentModel.isMesh && currentModel.geometry.type === 'BoxGeometry' && currentModel.visible) {
                currentModel.rotation.y += 0.01;
                currentModel.rotation.x += 0.005;
            }
            
            renderer.render(scene, camera);
        }
        
        // Eventos de UI
        document.getElementById('loadModelBtn').addEventListener('click', () => {
            const selectedModel = document.getElementById('modelSelect').value;
            loadModel(selectedModel);
        });
        
        document.getElementById('recordBtn').addEventListener('click', startRecording);
        document.getElementById('stopRecordBtn').addEventListener('click', stopRecording);
        document.getElementById('resetBtn').addEventListener('click', resetScene);
        
        // Manejar resize
        window.addEventListener('resize', () => {
            const aspect = window.innerWidth / window.innerHeight;
            camera.aspect = aspect;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
        
        // Iniciar
        init();
    </script>
</body>
</html>
