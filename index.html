<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AR Studio - Realidad Aumentada</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- A-Frame y AR.js -->
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/aframe-ar.js@3.0.2/aframe-ar.min.js"></script>
    
    <!-- RecordRTC -->
    <script src="https://cdn.jsdelivr.net/npm/recordrtc@5.6.2/RecordRTC.min.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: #000;
            overflow: hidden;
            position: fixed;
            width: 100%;
            height: 100%;
        }
        
        /* Pantalla de inicio */
        .start-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
            z-index: 2000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 0.5s ease;
        }
        
        .logo h1 {
            font-size: 2.5rem;
            background: linear-gradient(135deg, #00ff88, #00ccff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .instructions {
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 20px;
            margin: 20px;
            max-width: 350px;
        }
        
        .instructions h3 {
            color: #00ff88;
            margin-bottom: 15px;
        }
        
        .instructions li {
            color: #ccc;
            margin: 10px 0;
            margin-left: 20px;
        }
        
        .start-btn {
            background: linear-gradient(135deg, #00ff88, #00ccff);
            border: none;
            padding: 15px 40px;
            border-radius: 40px;
            font-size: 1.1rem;
            font-weight: 600;
            color: #000;
            cursor: pointer;
            margin-top: 20px;
        }
        
        /* UI Principal */
        .ui-container {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(20px);
            padding: 12px 16px;
            z-index: 1000;
            display: none;
            flex-direction: column;
            gap: 12px;
        }
        
        .tabs {
            display: flex;
            gap: 8px;
            background: rgba(255,255,255,0.05);
            padding: 4px;
            border-radius: 50px;
        }
        
        .tab-btn {
            flex: 1;
            padding: 10px;
            border: none;
            background: transparent;
            color: #aaa;
            font-weight: 600;
            border-radius: 40px;
            cursor: pointer;
            font-size: 0.8rem;
        }
        
        .tab-btn.active {
            background: #00ff88;
            color: #000;
        }
        
        .panel {
            display: none;
            gap: 10px;
            flex-wrap: wrap;
            max-height: 160px;
            overflow-y: auto;
        }
        
        .panel.active {
            display: flex;
        }
        
        .model-item, .marker-item {
            background: rgba(255,255,255,0.08);
            border-radius: 12px;
            padding: 8px 12px;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            border: 1px solid transparent;
            flex: 1;
            min-width: calc(50% - 10px);
        }
        
        .model-item.active, .marker-item.active {
            border-color: #00ff88;
            background: rgba(0,255,136,0.1);
        }
        
        .model-preview, .marker-preview {
            width: 35px;
            height: 35px;
            background: #333;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
        }
        
        .model-name, .marker-name {
            color: white;
            font-size: 0.8rem;
            font-weight: 500;
        }
        
        .controls-row {
            display: flex;
            gap: 12px;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
        }
        
        .scale-control {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(255,255,255,0.05);
            padding: 6px 12px;
            border-radius: 40px;
        }
        
        .scale-control label {
            color: #aaa;
            font-size: 0.7rem;
        }
        
        .action-buttons {
            display: flex;
            gap: 10px;
        }
        
        .action-btn {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            font-size: 1.2rem;
        }
        
        .record-btn {
            background: #ff0000;
            color: white;
        }
        
        .record-btn.recording {
            animation: pulse 1s infinite;
        }
        
        .photo-btn {
            background: #333;
            color: white;
        }
        
        .reset-btn {
            background: #ff4444;
            color: white;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
        
        .status-bar {
            position: fixed;
            top: 10px;
            left: 10px;
            right: 10px;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
            padding: 10px 15px;
            border-radius: 30px;
            z-index: 1000;
            display: none;
            font-size: 0.7rem;
            color: #00ff88;
            text-align: center;
        }
        
        /* Permiso denegado */
        .permission-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 3000;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }
        
        .permission-overlay button {
            background: #00ff88;
            border: none;
            padding: 15px 30px;
            border-radius: 40px;
            margin-top: 20px;
            font-weight: bold;
        }
        
        @media (min-width: 768px) {
            .ui-container {
                left: auto;
                right: 20px;
                bottom: 20px;
                width: 350px;
                border-radius: 24px;
            }
        }
    </style>
</head>
<body>
    <!-- Pantalla de inicio -->
    <div class="start-screen" id="startScreen">
        <div class="logo">
            <h1>AR STUDIO</h1>
        </div>
        <div class="instructions">
            <h3>📱 CÓMO USAR</h3>
            <ul>
                <li>📸 Permite acceso a la cámara</li>
                <li>🖼️ IMAGE TRACKING: Enfoca el marcador</li>
                <li>🌍 WORLD TRACKING: Toca donde colocar</li>
                <li>🎥 Graba video o toma fotos</li>
            </ul>
        </div>
        <button class="start-btn" id="startBtn">INICIAR</button>
    </div>
    
    <!-- Overlay de permisos -->
    <div class="permission-overlay" id="permissionOverlay">
        <div style="color:white; font-size:1.2rem;">📷 NECESITAMOS ACCESO A LA CÁMARA</div>
        <p style="color:#aaa; margin-top:15px;">Para usar la Realidad Aumentada</p>
        <button id="retryPermissionBtn">REINTENTAR</button>
    </div>
    
    <!-- Barra de estado -->
    <div class="status-bar" id="statusBar">
        <span id="statusText">● INICIANDO...</span>
    </div>
    
    <!-- UI Principal -->
    <div class="ui-container" id="uiContainer">
        <div class="tabs">
            <button class="tab-btn active" data-tab="models">📦 MODELOS</button>
            <button class="tab-btn" data-tab="markers">🏷️ MARCADORES</button>
            <button class="tab-btn" data-tab="tracking">🎯 TRACKING</button>
        </div>
        
        <div class="panel active" id="modelsPanel"></div>
        <div class="panel" id="markersPanel"></div>
        <div class="panel" id="trackingPanel">
            <div class="controls-row">
                <div class="scale-control">
                    <label>ESCALA</label>
                    <input type="range" id="scaleSlider" min="0.1" max="2" step="0.05" value="0.8">
                    <span id="scaleValue" style="color:#00ff88;">0.8</span>
                </div>
                <div class="action-buttons">
                    <button class="action-btn photo-btn" id="photoBtn">📷</button>
                    <button class="action-btn record-btn" id="recordBtn">🔴</button>
                    <button class="action-btn reset-btn" id="resetBtn">⟳</button>
                </div>
            </div>
            <div id="stopBtnContainer" style="display:none;">
                <button id="stopRecordingBtn" style="width:100%; border-radius:40px; background:#333; padding:12px; color:white; border:none;">⏹️ DETENER</button>
            </div>
        </div>
    </div>
    
    <!-- Escena AR -->
    <a-scene 
        id="arScene"
        embedded
        arjs="sourceType: webcam; debugUIEnabled: false;"
        vr-mode-ui="enabled: false"
        renderer="alpha: false; antialias: true;"
    >
        <a-marker id="imageMarker" preset="hiro" visible="false">
            <a-entity id="imageModel">
                <a-box color="#00ff88" depth="0.5" height="0.5" width="0.5"></a-box>
            </a-entity>
        </a-marker>
        
        <a-entity id="worldModel" visible="false" position="0 0 -1.5">
            <a-box color="#00ff88" depth="0.4" height="0.4" width="0.4"></a-box>
        </a-entity>
        
        <a-light type="ambient" intensity="0.6"></a-light>
        <a-light type="directional" intensity="0.8" position="5 10 7"></a-light>
    </a-scene>
    
    <script>
        // ============================================
        // CONFIGURACIÓN
        // ============================================
        
        // Elementos
        const startScreen = document.getElementById('startScreen');
        const startBtn = document.getElementById('startBtn');
        const uiContainer = document.getElementById('uiContainer');
        const statusBar = document.getElementById('statusBar');
        const statusText = document.getElementById('statusText');
        const modelsPanel = document.getElementById('modelsPanel');
        const markersPanel = document.getElementById('markersPanel');
        const scaleSlider = document.getElementById('scaleSlider');
        const scaleValue = document.getElementById('scaleValue');
        const recordBtn = document.getElementById('recordBtn');
        const photoBtn = document.getElementById('photoBtn');
        const resetBtn = document.getElementById('resetBtn');
        const stopRecordingBtn = document.getElementById('stopRecordingBtn');
        const stopBtnContainer = document.getElementById('stopBtnContainer');
        const permissionOverlay = document.getElementById('permissionOverlay');
        const retryPermissionBtn = document.getElementById('retryPermissionBtn');
        
        // Elementos AR
        const imageMarker = document.getElementById('imageMarker');
        const imageModel = document.getElementById('imageModel');
        const worldModel = document.getElementById('worldModel');
        
        // Estado
        let currentTracking = 'image';
        let currentModelData = null;
        let currentMarker = 'hiro';
        let worldPlaced = false;
        let isRecording = false;
        let recordRTC = null;
        let stream = null;
        
        // Librerías
        const modelLibrary = [
            { name: 'Cubo Verde', type: 'primitive', primitive: 'box', color: '#00ff88', icon: '📦' },
            { name: 'Esfera Naranja', type: 'primitive', primitive: 'sphere', color: '#ff6600', icon: '⚪' },
            { name: 'Toro Rosa', type: 'primitive', primitive: 'torus', color: '#ff3366', icon: '🌀' }
        ];
        
        const markerLibrary = [
            { name: 'HIRO', type: 'preset', value: 'hiro', icon: '🎯' },
            { name: 'KANJI', type: 'preset', value: 'kanji', icon: '📜' }
        ];
        
        // ============================================
        // PERMISOS DE CÁMARA
        // ============================================
        
        async function requestCameraPermission() {
            try {
                statusText.innerHTML = '📷 Solicitando permiso de cámara...';
                
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: 'environment' } 
                });
                
                // Detener stream temporalmente (AR.js lo manejará)
                stream.getTracks().forEach(track => track.stop());
                
                statusText.innerHTML = '✅ Permiso de cámara concedido';
                permissionOverlay.style.display = 'none';
                return true;
                
            } catch (error) {
                console.error('Error de permiso:', error);
                statusText.innerHTML = '❌ Permiso de cámara denegado';
                permissionOverlay.style.display = 'flex';
                return false;
            }
        }
        
        // ============================================
        // FUNCIONES UI
        // ============================================
        
        function renderModels() {
            modelsPanel.innerHTML = '';
            modelLibrary.forEach(model => {
                const div = document.createElement('div');
                div.className = 'model-item';
                if (currentModelData?.name === model.name) div.classList.add('active');
                div.innerHTML = `
                    <div class="model-preview">${model.icon}</div>
                    <div class="model-name">${model.name}</div>
                `;
                div.onclick = () => loadModel(model);
                modelsPanel.appendChild(div);
            });
        }
        
        function renderMarkers() {
            markersPanel.innerHTML = '';
            markerLibrary.forEach(marker => {
                const div = document.createElement('div');
                div.className = 'marker-item';
                if (currentMarker === marker.value) div.classList.add('active');
                div.innerHTML = `
                    <div class="marker-preview">${marker.icon}</div>
                    <div class="marker-name">${marker.name}</div>
                `;
                div.onclick = () => selectMarker(marker);
                markersPanel.appendChild(div);
            });
        }
        
        function loadModel(model) {
            currentModelData = model;
            
            document.querySelectorAll('.model-item').forEach(item => item.classList.remove('active'));
            if (event?.target) {
                event.target.closest('.model-item')?.classList.add('active');
            }
            
            // Actualizar modelo en ambos modos
            imageModel.innerHTML = '';
            worldModel.innerHTML = '';
            
            let entity = document.createElement(`a-${model.primitive}`);
            entity.setAttribute('color', model.color);
            entity.setAttribute('scale', `${scaleSlider.value} ${scaleSlider.value} ${scaleSlider.value}`);
            
            if (model.primitive === 'box') {
                entity.setAttribute('depth', '0.5');
                entity.setAttribute('height', '0.5');
                entity.setAttribute('width', '0.5');
            } else if (model.primitive === 'sphere') {
                entity.setAttribute('radius', '0.3');
            } else if (model.primitive === 'torus') {
                entity.setAttribute('radius', '0.3');
                entity.setAttribute('radius-tubular', '0.05');
            }
            
            const imageEntity = entity.cloneNode(true);
            const worldEntity = entity.cloneNode(true);
            imageModel.appendChild(imageEntity);
            worldModel.appendChild(worldEntity);
            
            statusText.innerHTML = `✅ Modelo: ${model.name}`;
        }
        
        function selectMarker(marker) {
            currentMarker = marker.value;
            
            document.querySelectorAll('.marker-item').forEach(item => item.classList.remove('active'));
            if (event?.target) {
                event.target.closest('.marker-item')?.classList.add('active');
            }
            
            imageMarker.setAttribute('preset', marker.value);
            statusText.innerHTML = `🏷️ Marcador: ${marker.name}`;
        }
        
        function setTrackingMode(mode) {
            currentTracking = mode;
            
            if (mode === 'image') {
                imageMarker.setAttribute('visible', 'true');
                worldModel.setAttribute('visible', 'false');
                statusText.innerHTML = `🖼️ IMAGE TRACKING | Enfoca marcador ${currentMarker.toUpperCase()}`;
            } else {
                imageMarker.setAttribute('visible', 'false');
                worldModel.setAttribute('visible', 'true');
                worldPlaced = false;
                statusText.innerHTML = `🌍 WORLD TRACKING | Toca pantalla para colocar`;
            }
        }
        
        function placeWorldModel() {
            if (!worldPlaced && currentTracking === 'world') {
                worldModel.setAttribute('position', '0 0 -1.5');
                worldPlaced = true;
                worldModel.setAttribute('animation', 'property: scale; from: 0 0 0; to: 0.8 0.8 0.8; dur: 300');
                setTimeout(() => worldModel.removeAttribute('animation'), 350);
                statusText.innerHTML = '✅ Modelo colocado!';
            }
        }
        
        function resetWorldModel() {
            if (currentTracking === 'world') {
                worldPlaced = false;
                worldModel.setAttribute('position', '0 0 0');
                statusText.innerHTML = '🔄 Posición reseteada';
            }
        }
        
        function updateScale(value) {
            const scale = parseFloat(value);
            scaleValue.textContent = scale.toFixed(2);
            
            if (currentTracking === 'image') {
                imageModel.setAttribute('scale', `${scale} ${scale} ${scale}`);
            } else {
                worldModel.setAttribute('scale', `${scale} ${scale} ${scale}`);
            }
        }
        
        // ============================================
        // GRABACIÓN
        // ============================================
        
        async function startRecording() {
            try {
                const canvas = document.querySelector('a-scene').canvas;
                if (!canvas) throw new Error('Canvas no disponible');
                
                stream = canvas.captureStream(30);
                recordRTC = new RecordRTC(stream, {
                    type: 'video',
                    mimeType: 'video/webm',
                    bitsPerSecond: 3000000
                });
                
                recordRTC.startRecording();
                isRecording = true;
                
                recordBtn.classList.add('recording');
                recordBtn.style.display = 'none';
                stopBtnContainer.style.display = 'block';
                statusText.innerHTML = '🔴 GRABANDO...';
                
            } catch (error) {
                statusText.innerHTML = '❌ Error al grabar';
            }
        }
        
        function stopRecording() {
            if (recordRTC && isRecording) {
                recordRTC.stopRecording(() => {
                    const blob = recordRTC.getBlob();
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.download = `ar-video-${Date.now()}.webm`;
                    a.href = url;
                    a.click();
                    URL.revokeObjectURL(url);
                    
                    if (stream) stream.getTracks().forEach(t => t.stop());
                    recordRTC = null;
                    isRecording = false;
                    
                    recordBtn.classList.remove('recording');
                    recordBtn.style.display = 'block';
                    stopBtnContainer.style.display = 'none';
                    statusText.innerHTML = '✅ Video guardado';
                });
            }
        }
        
        async function takePhoto() {
            try {
                const canvas = document.querySelector('a-scene').canvas;
                if (!canvas) throw new Error('Canvas no disponible');
                
                const link = document.createElement('a');
                link.download = `ar-photo-${Date.now()}.png`;
                link.href = canvas.toDataURL('image/png');
                link.click();
                statusText.innerHTML = '📸 Foto guardada';
                
            } catch (error) {
                statusText.innerHTML = '❌ Error al tomar foto';
            }
        }
        
        // ============================================
        // INICIALIZACIÓN
        // ============================================
        
        async function initApp() {
            // Solicitar permiso de cámara primero
            const hasPermission = await requestCameraPermission();
            if (!hasPermission) return;
            
            // Inicializar UI
            renderModels();
            renderMarkers();
            loadModel(modelLibrary[0]);
            selectMarker(markerLibrary[0]);
            setTrackingMode('image');
            
            // Mostrar UI
            startScreen.style.opacity = '0';
            setTimeout(() => {
                startScreen.style.display = 'none';
                uiContainer.style.display = 'flex';
                statusBar.style.display = 'block';
                statusText.innerHTML = '✅ AR ACTIVO | Cámara lista';
            }, 500);
            
            // Forzar recarga de AR.js
            const scene = document.querySelector('a-scene');
            if (scene) {
                scene.addEventListener('arjs-video-loaded', () => {
                    statusText.innerHTML = '📷 Cámara activa | Listo para AR';
                });
            }
        }
        
        // ============================================
        // EVENTOS
        // ============================================
        
        startBtn.addEventListener('click', initApp);
        retryPermissionBtn.addEventListener('click', initApp);
        
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
                document.getElementById(`${btn.dataset.tab}Panel`).classList.add('active');
            });
        });
        
        scaleSlider.addEventListener('input', (e) => updateScale(e.target.value));
        recordBtn.addEventListener('click', startRecording);
        stopRecordingBtn?.addEventListener('click', stopRecording);
        photoBtn.addEventListener('click', takePhoto);
        resetBtn.addEventListener('click', resetWorldModel);
        
        document.addEventListener('click', (e) => {
            if (e.target.closest('.ui-container')) return;
            if (currentTracking === 'world' && !worldPlaced) {
                placeWorldModel();
            }
        });
        
        console.log('%c🎨 AR STUDIO - Listo!', 'color: #00ff88; font-size: 14px');
    </script>
</body>
</html>
